<script>
const tg = window.Telegram?.WebApp;

if (tg) {
    tg.ready();
    tg.expand();
}

let parts = JSON.parse(localStorage.getItem("parts") || "[]");

/* ---------- USER ---------- */
function safeUserId() {
    return tg?.initDataUnsafe?.user?.id || "0";
}

function safeUsername() {
    return tg?.initDataUnsafe?.user?.username || "no_username";
}

/* ---------- REGISTER FIX ---------- */
async function registerUser() {
    await fetch("/register", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            telegram_id: safeUserId(),
            username: safeUsername()
        })
    });
}

/* ---------- TABS ---------- */
function showTab(tab) {
    ["sale","repair","parts","analytics","profile","admin"].forEach(id=>{
        document.getElementById(id).classList.add("hidden");
    });
    document.getElementById(tab).classList.remove("hidden");
}

/* ---------- PARTS ---------- */
function renderParts() {
    const list = document.getElementById("parts_list");
    const select = document.getElementById("parts_select");

    list.innerHTML = "";
    select.innerHTML = "";

    parts.forEach((p, i) => {
        const li = document.createElement("li");
        li.innerText = p.name + " - " + p.price;

        const del = document.createElement("button");
        del.innerText = "Удалить";
        del.className = "del";

        del.onclick = () => {
            parts.splice(i,1);
            localStorage.setItem("parts", JSON.stringify(parts));
            renderParts();
        };

        li.appendChild(del);
        list.appendChild(li);

        const opt = document.createElement("option");
        opt.value = JSON.stringify(p);
        opt.text = p.name;

        select.appendChild(opt);
    });
}

function addPart() {
    parts.push({
        name: document.getElementById("part_name").value,
        price: document.getElementById("part_price").value
    });

    localStorage.setItem("parts", JSON.stringify(parts));
    renderParts();
}

/* ---------- SALE ---------- */
async function sendSale() {

    const res = await fetch("/report", {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body: JSON.stringify({
            telegram_id: safeUserId(),
            type: "sale",
            model: sale_model.value,
            purchase_price: Number(sale_purchase.value),
            repair_cost: Number(sale_repair.value),
            sell_price: Number(sale_sell.value)
        })
    });

    const r = await res.json();
    sale_profit.innerText = "Profit: " + r.profit;
}

/* ---------- REPAIR ---------- */
async function sendRepair() {

    const selected = [...parts_select.selectedOptions]
        .map(o => JSON.parse(o.value));

    let sum = 0;
    selected.forEach(p => sum += Number(p.price));

    await fetch("/report", {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body: JSON.stringify({
            telegram_id: safeUserId(),
            type:"repair",
            model: repair_model.value,
            purchase_price:0,
            repair_cost: Number(repair_price.value) + sum,
            sell_price:0
        })
    });

    alert("Сохранено");
}

/* ---------- ANALYTICS FIX ---------- */
async function loadAnalytics() {

    showTab("analytics");

    const r = await fetch("/analytics");
    const d = await r.json();

    analytics.innerHTML =
    `<h3>Аналитика</h3>
     <p>Продажи: ${d.sales_profit}</p>
     <p>Ремонты: ${d.repairs_profit}</p>
     <p>Итого: ${d.total_profit}</p>`;
}

/* ---------- PROFILE ---------- */
async function loadProfile() {

    showTab("profile");

    profile.innerHTML =
    `<h3>Профиль</h3>
     <p>ID: ${safeUserId()}</p>
     <p>Username: ${safeUsername()}</p>`;
}

/* ---------- ADMIN FIX ---------- */
async function loadAdmin() {

    showTab("admin");

    const r = await fetch("/admin");
    const d = await r.json();

    let usersHtml = "";

    Object.values(d.users).forEach(u=>{
        usersHtml += `<p>${u.username} (${u.role})</p>`;
    });

    admin.innerHTML =
    `<h3>Админ</h3>
     <h4>Пользователи</h4>
     ${usersHtml}
     <h4>Отчеты: ${d.reports.length}</h4>`;
}

/* ---------- INIT ---------- */
registerUser();
renderParts();
</script>
