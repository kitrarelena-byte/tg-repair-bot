<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>CRM</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0f172a;
    color: white;
    overflow: hidden;
}

/* TOP MENU SCROLL FIX */
.tabbar {
    display: flex;
    overflow-x: auto;
    gap: 10px;
    padding: 10px;
    background: #1e293b;
    white-space: nowrap;
}

.tab {
    flex: 0 0 auto;
    padding: 10px 15px;
    background: #0f172a;
    border-radius: 10px;
    cursor: pointer;
}

/* CARD */
.card {
    background: #1e293b;
    padding: 15px;
    border-radius: 12px;
    margin: 10px;
}

.hidden {
    display: none;
}

input, select {
    width: 100%;
    padding: 10px;
    margin-top: 8px;
    border-radius: 8px;
    border: none;
}

button {
    margin-top: 10px;
    padding: 12px;
    width: 100%;
    border-radius: 10px;
    border: none;
    background: #22c55e;
    font-weight: bold;
}

/* PARTS DELETE UI */
.part-item {
    display: flex;
    justify-content: space-between;
    padding: 8px;
    margin-top: 6px;
    background: #0f172a;
    border-radius: 8px;
}

.delete {
    color: red;
    cursor: pointer;
}
</style>
</head>

<body>

<div class="tabbar">
    <div class="tab" onclick="showTab('sale')">📊 Продажа</div>
    <div class="tab" onclick="showTab('repair')">🛠 Ремонт</div>
    <div class="tab" onclick="showTab('parts')">🔩 Запчасти</div>
    <div class="tab" onclick="loadAnalytics()">📈 Аналитика</div>
    <div class="tab" onclick="loadAdmin()">👤 Админ</div>
    <div class="tab" onclick="loadProfile()">🙍 Профиль</div>
</div>

<div id="sale" class="card">
    <h3>Продажа</h3>
    <input id="sale_model">
    <input id="sale_purchase">
    <input id="sale_repair">
    <input id="sale_sell">
    <button onclick="sendSale()">Сохранить</button>
    <div id="sale_profit"></div>
</div>

<div id="repair" class="card hidden">
    <h3>Ремонт</h3>
    <input id="repair_model">
    <select id="parts_select" multiple></select>
    <input id="repair_price">
    <button onclick="sendRepair()">Сохранить</button>
</div>

<div id="parts" class="card hidden">
    <h3>Запчасти</h3>
    <input id="part_name">
    <input id="part_price">
    <button onclick="addPart()">Добавить</button>
    <div id="parts_list"></div>
</div>

<div id="analytics" class="card hidden"></div>
<div id="admin" class="card hidden"></div>
<div id="profile" class="card hidden"></div>

<script>
const tg = window.Telegram?.WebApp;

if (tg) {
    tg.ready();
    tg.expand();
    tg.disableVerticalSwipes?.();
    document.body.style.overscrollBehavior = "none";
}

let parts = JSON.parse(localStorage.getItem("parts") || "[]");

function safeUserId(){
    return tg?.initDataUnsafe?.user?.id || "0";
}

/* TABS */
function showTab(tab){
    ["sale","repair","parts","analytics","admin","profile"].forEach(id=>{
        document.getElementById(id).classList.add("hidden");
    });
    document.getElementById(tab).classList.remove("hidden");
}

/* PARTS */
function addPart(){
    parts.push({
        name: part_name.value,
        price: Number(part_price.value)
    });

    localStorage.setItem("parts", JSON.stringify(parts));
    renderParts();
}

function renderParts(){
    parts_list.innerHTML = "";
    parts_select.innerHTML = "";

    parts.forEach((p,i)=>{

        const div = document.createElement("div");
        div.className = "part-item";

        div.innerHTML = `
            <span>${p.name} - ${p.price}</span>
            <span class="delete">✖</span>
        `;

        div.querySelector(".delete").onclick = ()=>{
            parts.splice(i,1);
            localStorage.setItem("parts", JSON.stringify(parts));
            renderParts();
        };

        parts_list.appendChild(div);

        const opt = document.createElement("option");
        opt.value = JSON.stringify(p);
        opt.text = p.name;
        parts_select.appendChild(opt);
    });
}

/* SALE */
async function sendSale(){
    const r = await fetch("/report",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body: JSON.stringify({
            telegram_id: safeUserId(),
            type:"sale",
            model: sale_model.value,
            purchase_price: Number(sale_purchase.value),
            repair_cost: Number(sale_repair.value),
            sell_price: Number(sale_sell.value)
        })
    });

    const d = await r.json();
    sale_profit.innerText = "💰 " + d.profit;
}

/* REPAIR */
async function sendRepair(){

    let partsSum = 0;
    [...parts_select.selectedOptions].forEach(o=>{
        partsSum += JSON.parse(o.value).price;
    });

    await fetch("/report",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body: JSON.stringify({
            telegram_id: safeUserId(),
            type:"repair",
            model: repair_model.value,
            purchase_price:0,
            repair_cost:Number(repair_price.value),
            sell_price:0
        })
    });

    alert("OK");
}

/* ANALYTICS FIX */
async function loadAnalytics(){
    showTab("analytics");

    const r = await fetch("/analytics");
    const d = await r.json();

    analytics.innerHTML = `
        <h3>📊 Аналитика</h3>
        <p>Продажи: ${d.sales_profit}</p>
        <p>Ремонты: ${d.repairs_profit}</p>
        <p>Общая: ${d.total_profit}</p>
    `;
}

/* ADMIN FIX */
async function loadAdmin(){
    showTab("admin");

    const r = await fetch("/admin");
    const d = await r.json();

    let usersHtml = "";
    Object.keys(d.users).forEach(u=>{
        usersHtml += <p>👤 ${u} (${d.users[u].role})</p>;
    });

    admin.innerHTML = `
        <h3>👤 Админ</h3>
        ${usersHtml}
        <p>Отчётов: ${d.reports.length}</p>
    `;
}

/* PROFILE */
function loadProfile(){
    showTab("profile");
    profile.innerHTML = <h3>Профиль</h3><p>ID: ${safeUserId()}</p>;
}

renderParts();
</script>

</body>
</html>
