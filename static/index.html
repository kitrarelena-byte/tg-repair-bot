<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>CRM</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0f172a;
    color: white;
}

.tabbar {
    display: flex;
    overflow-x: auto;
    background: #1e293b;
    padding: 10px;
    gap: 10px;
}

.tab {
    background: #334155;
    padding: 8px 12px;
    border-radius: 10px;
    cursor: pointer;
    white-space: nowrap;
}

.container { padding: 15px; }

.hidden { display: none; }

.card {
    background: #1e293b;
    padding: 15px;
    border-radius: 12px;
    margin-bottom: 15px;
}

input, select {
    width: 100%;
    padding: 10px;
    margin-top: 8px;
    border-radius: 8px;
    border: none;
}

button {
    margin-top: 10px;
    padding: 12px;
    width: 100%;
    border-radius: 10px;
    border: none;
    background: #22c55e;
}

.delete {
    background: #ef4444;
}
</style>
</head>

<body>

<div class="tabbar">
    <div class="tab" onclick="showTab('sale')">Продажа</div>
    <div class="tab" onclick="showTab('repair')">Ремонт</div>
    <div class="tab" onclick="showTab('parts')">Запчасти</div>
    <div class="tab" onclick="loadAnalytics()">Аналитика</div>
    <div class="tab" onclick="loadAdmin()">Админ</div>
    <div class="tab" onclick="loadProfile()">Профиль</div>
</div>

<div class="container">

<div id="sale" class="card">
<h3>Продажа</h3>
<input id="sale_model">
<input id="sale_purchase">
<input id="sale_repair">
<input id="sale_sell">
<button onclick="sendSale()">OK</button>
<div id="sale_profit"></div>
</div>

<div id="repair" class="card hidden">
<h3>Ремонт</h3>
<input id="repair_model">
<select id="parts_select" multiple></select>
<input id="repair_price">
<button onclick="sendRepair()">OK</button>
</div>

<div id="parts" class="card hidden">
<h3>Запчасти</h3>
<input id="part_name">
<input id="part_price">
<button onclick="addPart()">Добавить</button>
<ul id="parts_list"></ul>
</div>

<div id="analytics" class="card hidden"></div>
<div id="admin" class="card hidden"></div>
<div id="profile" class="card hidden"></div>

</div>

<script>
const tg = window.Telegram?.WebApp;
if (tg) { tg.ready(); tg.expand(); }

let parts = JSON.parse(localStorage.getItem("parts") || "[]");

function uid() {
    return tg?.initDataUnsafe?.user?.id || "0";
}

function uname() {
    return tg?.initDataUnsafe?.user?.username || "no_username";
}

/* REGISTER FIX */
fetch("/register", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({telegram_id: uid()})
});

/* PARTS */
function saveParts(){
    localStorage.setItem("parts", JSON.stringify(parts));
}

function renderParts(){
    parts_list.innerHTML = "";
    parts_select.innerHTML = "";

    parts.forEach((p,i)=>{
        const li = document.createElement("li");
        li.innerHTML = `${p.name} - ${p.price}
        <button class="delete" onclick="del(${i})">X</button>`;
        parts_list.appendChild(li);

        const opt = document.createElement("option");
        opt.value = JSON.stringify(p);
        opt.text = p.name;
        parts_select.appendChild(opt);
    });
}

function del(i){
    parts.splice(i,1);
    saveParts();
    renderParts();
}

function addPart(){
    parts.push({
        name: part_name.value,
        price: part_price.value
    });
    saveParts();
    renderParts();
}

/* SALE */
async function sendSale(){
    const r = await fetch("/report",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
            telegram_id: uid(),
            type:"sale",
            model:sale_model.value,
            purchase_price:+sale_purchase.value,
            repair_cost:+sale_repair.value,
            sell_price:+sale_sell.value
        })
    });

    const d = await r.json();
    sale_profit.innerText = "Profit: "+d.profit;
}

/* REPAIR */
async function sendRepair(){
    const sel = [...parts_select.selectedOptions].map(o=>JSON.parse(o.value));
    const sum = sel.reduce((a,b)=>a+ +b.price,0);

    await fetch("/report",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
            telegram_id: uid(),
            type:"repair",
            model:repair_model.value,
            purchase_price:0,
            repair_cost:+repair_price.value + sum,
            sell_price:0
        })
    });

    alert("OK");
}

/* ANALYTICS FIX */
async function loadAnalytics(){
    showTab("analytics");
    const r = await fetch("/analytics");
    const d = await r.json();

    analytics.innerHTML = `
    <h3>Аналитика</h3>
    <p>Продажи: ${d.sales_profit}</p>
    <p>Ремонт: ${d.repairs_profit}</p>
    <p>Итого: ${d.total_profit}</p>`;
}

/* ADMIN FIX */
async function loadAdmin(){
    showTab("admin");
    const r = await fetch("/admin");
    const d = await r.json();

    admin.innerHTML = `
    <h3>Админ</h3>
    <p>Users: ${Object.keys(d.users).length}</p>
    <p>Reports: ${d.reports.length}</p>`;
}

/* PROFILE FIX */
function loadProfile(){
    showTab("profile");
    profile.innerHTML = `
    <h3>Профиль</h3>
    <p>ID: ${uid()}</p>
    <p>Username: ${uname()}</p>`;
}

function showTab(id){
    ["sale","repair","parts","analytics","admin","profile"]
    .forEach(x=>document.getElementById(x).classList.add("hidden"));

    document.getElementById(id).classList.remove("hidden");
}

renderParts();
</script>

</body>
</html>
