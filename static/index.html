<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">

<title>CRM</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0f172a;
    color: white;
}

/* TOP MENU */
.tabbar {
    display: flex;
    overflow-x: auto;
    gap: 10px;
    padding: 10px;
    background: #1e293b;
}

.tab {
    flex: 0 0 auto;
    padding: 10px 14px;
    background: #0f172a;
    border-radius: 10px;
    cursor: pointer;
}

/* CARD */
.card {
    margin: 10px;
    padding: 15px;
    background: #1e293b;
    border-radius: 12px;
}

.hidden { display: none; }

input, select {
    width: 100%;
    padding: 10px;
    margin-top: 8px;
    border-radius: 8px;
    border: none;
}

button {
    margin-top: 10px;
    padding: 12px;
    width: 100%;
    border-radius: 10px;
    border: none;
    background: #22c55e;
    font-weight: bold;
}

.part-item {
    display:flex;
    justify-content:space-between;
    padding:8px;
    background:#0f172a;
    margin-top:6px;
    border-radius:8px;
}
</style>
</head>

<body>

<div class="tabbar">
    <div class="tab" onclick="showTab('sale')">📊 Продажа</div>
    <div class="tab" onclick="showTab('repair')">🛠 Ремонт</div>
    <div class="tab" onclick="showTab('parts')">🔩 Запчасти</div>
    <div class="tab" onclick="loadAnalytics()">📈 Аналитика</div>
    <div class="tab" onclick="loadAdmin()">👤 Админ</div>
    <div class="tab" onclick="loadProfile()">🙍 Профиль</div>
</div>

<!-- SALE -->
<div id="sale" class="card">
    <h3>Продажа</h3>
    <input id="sale_model" placeholder="Модель">
    <input id="sale_purchase" placeholder="Цена покупки">
    <input id="sale_repair" placeholder="Цена ремонта">
    <input id="sale_sell" placeholder="Цена продажи">
    <button onclick="sendSale()">Сохранить</button>
    <div id="sale_profit"></div>
</div>

<!-- REPAIR -->
<div id="repair" class="card hidden">
    <h3>Ремонт</h3>
    <input id="repair_model" placeholder="Модель">
    <select id="parts_select" multiple></select>
    <input id="repair_price" placeholder="Цена ремонта">
    <button onclick="sendRepair()">Сохранить</button>
</div>

<!-- PARTS -->
<div id="parts" class="card hidden">
    <h3>Запчасти</h3>
    <input id="part_name" placeholder="Название">
    <input id="part_price" placeholder="Цена">
    <button onclick="addPart()">Добавить</button>
    <div id="parts_list"></div>
</div>

<!-- OTHER -->
<div id="analytics" class="card hidden"></div>
<div id="admin" class="card hidden"></div>
<div id="profile" class="card hidden"></div>

<script>

let tg = null;

try {
    tg = window.Telegram?.WebApp;
    tg?.ready();
    tg?.expand();
    tg?.disableVerticalSwipes?.();
} catch(e){}

let parts = JSON.parse(localStorage.getItem("parts") || "[]");

function safeUserId(){
    return tg?.initDataUnsafe?.user?.id || "0";
}

/* NAV */
function showTab(tab){
    ["sale","repair","parts","analytics","admin","profile"].forEach(id=>{
        const el = document.getElementById(id);
        if(el) el.classList.add("hidden");
    });

    const target = document.getElementById(tab);
    if(target) target.classList.remove("hidden");
}

/* PARTS */
function addPart(){
    const name = document.getElementById("part_name").value;
    const price = document.getElementById("part_price").value;

    if(!name || !price) return;

    parts.push({name, price:Number(price)});
    localStorage.setItem("parts", JSON.stringify(parts));
    renderParts();
}

function renderParts(){
    const list = document.getElementById("parts_list");
    const select = document.getElementById("parts_select");

    if(!list || !select) return;

    list.innerHTML = "";
    select.innerHTML = "";

    parts.forEach((p,i)=>{

        const div = document.createElement("div");
        div.className = "part-item";

        div.innerHTML = `
            <span>${p.name} - ${p.price}</span>
            <button onclick="deletePart(${i})">❌</button>
        `;

        list.appendChild(div);

        const opt = document.createElement("option");
        opt.value = JSON.stringify(p);
        opt.text = p.name;
        select.appendChild(opt);
    });
}

function deletePart(i){
    parts.splice(i,1);
    localStorage.setItem("parts", JSON.stringify(parts));
    renderParts();
}

/* SALE */
async function sendSale(){

    const data = {
        telegram_id: safeUserId(),
        type: "sale",
        model: document.getElementById("sale_model").value,
        purchase_price: Number(document.getElementById("sale_purchase").value || 0),
        repair_cost: Number(document.getElementById("sale_repair").value || 0),
        sell_price: Number(document.getElementById("sale_sell").value || 0)
    };

    const res = await fetch("/report",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body: JSON.stringify(data)
    });

    const r = await res.json();
    document.getElementById("sale_profit").innerText = "💰 " + r.profit;
}

/* REPAIR */
async function sendRepair(){

    let sum = 0;

    const selected = [...document.getElementById("parts_select").selectedOptions]
        .map(o => JSON.parse(o.value));

    selected.forEach(p => sum += Number(p.price));

    await fetch("/report",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body: JSON.stringify({
            telegram_id: safeUserId(),
            type:"repair",
            model: document.getElementById("repair_model").value,
            purchase_price:0,
            repair_cost:Number(document.getElementById("repair_price").value || 0),
            sell_price:0
        })
    });

    alert("OK");
}

/* ANALYTICS */
async function loadAnalytics(){
    showTab("analytics");

    const r = await fetch("/analytics");
    const d = await r.json();

    document.getElementById("analytics").innerHTML = `
        <h3>📈 Аналитика</h3>
        <p>Продажи: ${d.sales_profit}</p>
        <p>Ремонты: ${d.repairs_profit}</p>
        <p>Итого: ${d.total_profit}</p>
    `;
}

/* ADMIN */
async function loadAdmin(){
    showTab("admin");

    const r = await fetch("/admin");
    const d = await r.json();

    document.getElementById("admin").innerHTML =
        "<h3>👤 Админ</h3>" +
        "<p>Users: " + Object.keys(d.users).length + "</p>" +
        "<p>Reports: " + d.reports.length + "</p>";
}

/* PROFILE */
function loadProfile(){
    showTab("profile");
    document.getElementById("profile").innerHTML =
        "<h3>Профиль</h3><p>ID: " + safeUserId() + "</p>";
}

renderParts();
</script>

</body>
</html>
