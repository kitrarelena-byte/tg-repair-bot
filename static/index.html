<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>CRM</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
body {
    margin:0;
    font-family:Arial;
    background:#0b1220;
    color:white;
}

/* TOP BAR */
.tabbar {
    display:flex;
    overflow-x:auto;
    background:#111827;
    padding:10px;
    gap:10px;
}

.tab {
    padding:10px 14px;
    background:#1f2937;
    border-radius:10px;
    cursor:pointer;
    white-space:nowrap;
}

/* CONTAINER */
.container {
    padding:15px;
}

/* CARD */
.card {
    background:#111827;
    padding:15px;
    border-radius:14px;
    margin-bottom:15px;
}

/* INPUT */
input, select {
    width:100%;
    padding:10px;
    margin-top:8px;
    border-radius:8px;
    border:none;
    box-sizing:border-box;
}

/* BUTTON */
button {
    margin-top:10px;
    padding:12px;
    width:100%;
    border-radius:10px;
    border:none;
    background:#22c55e;
    font-weight:bold;
    cursor:pointer;
    color:white;
}

.del {
    background:#ef4444;
}

/* LIST */
li {
    padding:10px;
    background:#1f2937;
    margin-top:6px;
    border-radius:8px;
    list-style:none;
}

.hidden {
    display:none;
}

.search-card {
    background:#1f2937;
    padding:10px;
    margin-top:8px;
    border-radius:10px;
}
</style>
</head>

<body>

<div class="tabbar">

    <div class="tab" onclick="showTab('sale')">
        📊 Продажа
    </div>

    <div class="tab" onclick="showTab('repair')">
        🛠 Ремонт
    </div>

    <div class="tab" onclick="showTab('parts')">
        🔩 Запчасти
    </div>

    <div class="tab" onclick="loadAnalytics()">
        📈 Аналитика
    </div>

    <div class="tab" onclick="showTab('profile')">
        👤 Профиль
    </div>

    <div class="tab" onclick="loadAdmin()">
        ⚙️ Админ
    </div>

</div>

<div class="container">

<!-- SALE -->
<div id="sale" class="card">

    <h3>Продажа</h3>

    <input id="sale_model" placeholder="Модель">

    <input id="sale_purchase" placeholder="Цена покупки">

    <input id="sale_repair" placeholder="Цена ремонта">

    <input id="sale_sell" placeholder="Цена продажи">

    <button onclick="sendSale()">
        Сохранить
    </button>

    <div id="sale_profit"></div>

</div>

<!-- REPAIR -->
<div id="repair" class="card hidden">

    <h3>Ремонт</h3>

    <input id="repair_model" placeholder="Модель">

    <select id="parts_select" multiple></select>

    <input id="repair_price" placeholder="Цена работы">

    <button onclick="sendRepair()">
        Сохранить
    </button>

</div>

<!-- PARTS -->
<div id="parts" class="card hidden">

    <h3>Запчасти</h3>

    <input id="part_name" placeholder="Название">

    <input id="part_price" placeholder="Цена">

    <button onclick="addPart()">
        Добавить
    </button>

    <hr>

    <input id="search_query" placeholder="Поиск iparts">

    <button onclick="searchParts()">
        Найти
    </button>

    <div id="search_results"></div>

    <ul id="parts_list"></ul>

</div>

<!-- ANALYTICS -->
<div id="analytics" class="card hidden"></div>

<!-- PROFILE -->
<div id="profile" class="card hidden">

    <h3>Профиль</h3>

    <input id="reg_username" placeholder="Логин">

    <input
        id="reg_password"
        type="password"
        placeholder="Пароль"
    >

    <button onclick="register()">
        Регистрация
    </button>

    <button onclick="login()">
        Войти
    </button>

    <div id="profile_info"></div>

</div>

<!-- ADMIN -->
<div id="admin" class="card hidden"></div>

</div>

<script>

const tg = window.Telegram?.WebApp;

if (tg) {
    tg.ready();
    tg.expand();
}

/* ---------- USER ---------- */

function safeUserId() {
    return tg?.initDataUnsafe?.user?.id || "0";
}

function safeUsername() {
    return tg?.initDataUnsafe?.user?.username || "no_username";
}

/* ---------- TABS ---------- */

function showTab(tab) {

    [
        "sale",
        "repair",
        "parts",
        "analytics",
        "profile",
        "admin"
    ].forEach(id => {

        const el = document.getElementById(id);

        if (el)
            el.classList.add("hidden");
    });

    const active = document.getElementById(tab);

    if (active)
        active.classList.remove("hidden");
}

/* ---------- PARTS ---------- */

let parts = JSON.parse(
    localStorage.getItem("parts") || "[]"
);

function saveParts() {

    localStorage.setItem(
        "parts",
        JSON.stringify(parts)
    );
}

function renderParts() {

    const list =
        document.getElementById("parts_list");

    const select =
        document.getElementById("parts_select");

    if (!list || !select)
        return;

    list.innerHTML = "";
    select.innerHTML = "";

    parts.forEach((p, i) => {

        const li = document.createElement("li");

        li.innerHTML = `
            <b>${p.name}</b><br>
            ${p.price}
        `;

        const del = document.createElement("button");

        del.innerText = "Удалить";

        del.className = "del";

        del.onclick = () => {

            parts.splice(i, 1);

            saveParts();

            renderParts();
        };

        li.appendChild(del);

        list.appendChild(li);

        const opt = document.createElement("option");

        opt.value = JSON.stringify(p);

        opt.text = `${p.name} (${p.price})`;

        select.appendChild(opt);
    });
}

function addPart() {

    const name =
        document.getElementById("part_name").value;

    const price =
        document.getElementById("part_price").value;

    if (!name || !price)
        return;

    parts.push({
        name,
        price
    });

    saveParts();

    renderParts();

    document.getElementById("part_name").value = "";
    document.getElementById("part_price").value = "";
}

/* ---------- IPARTS ---------- */

async function searchParts() {

    const q =
        document.getElementById("search_query").value;

    if (!q)
        return;

    const container =
        document.getElementById("search_results");

    container.innerHTML = "Поиск...";

    try {

        const r = await fetch(
            "/parts/search?q=" +
            encodeURIComponent(q)
        );

        const data = await r.json();

        container.innerHTML = "";

        data.forEach(p => {

            const div =
                document.createElement("div");

            div.className = "search-card";

            div.innerHTML = `
                <b>${p.name}</b><br>
                <small>${p.price}</small>
            `;

            const btn =
                document.createElement("button");

            btn.innerText = "Добавить";

            btn.onclick = () => {

                parts.push({
                    name: p.name,
                    price: p.price
                });

                saveParts();

                renderParts();
            };

            div.appendChild(btn);

            container.appendChild(div);
        });

    } catch(e) {

        container.innerHTML =
            "Ошибка поиска";
    }
}

/* ---------- SALE ---------- */

async function sendSale() {

    const res = await fetch("/report", {

        method:"POST",

        headers:{
            "Content-Type":"application/json"
        },

        body: JSON.stringify({

            telegram_id: safeUserId(),

            type:"sale",

            model:
                document.getElementById(
                    "sale_model"
                ).value,

            purchase_price: Number(
                document.getElementById(
                    "sale_purchase"
                ).value
            ),

            repair_cost: Number(
                document.getElementById(
                    "sale_repair"
                ).value
            ),

            sell_price: Number(
                document.getElementById(
                    "sale_sell"
                ).value
            )
        })
    });

    const r = await res.json();

    document.getElementById(
        "sale_profit"
    ).innerText =
        "Profit: " + r.profit;
}

/* ---------- REPAIR ---------- */

async function sendRepair() {

    const selected =
        [...document.getElementById(
            "parts_select"
        ).selectedOptions]
        .map(o => JSON.parse(o.value));

    let partsSum = 0;

    selected.forEach(p => {
        partsSum += Number(p.price);
    });

    await fetch("/report", {

        method:"POST",

        headers:{
            "Content-Type":"application/json"
        },

        body: JSON.stringify({

            telegram_id: safeUserId(),

            type:"repair",

            model:
                document.getElementById(
                    "repair_model"
                ).value,

            purchase_price: partsSum,

            repair_cost: Number(
                document.getElementById(
                    "repair_price"
                ).value
            ),

            sell_price:0
        })
    });

    alert("Сохранено");
}

/* ---------- ANALYTICS ---------- */

async function loadAnalytics() {

    showTab("analytics");

    const r = await fetch("/analytics");

    const d = await r.json();

    document.getElementById(
        "analytics"
    ).innerHTML =

    `<h3>Аналитика</h3>

    <p>Продажи: ${d.sales_profit || 0}</p>

    <p>Ремонты: ${d.repairs_profit || 0}</p>

    <p><b>Итого: ${d.total_profit || 0}</b></p>

    <button onclick="loadReports()">
        Список ремонтов/продаж
    </button>

    <button
        class="del"
        onclick="clearReports()"
    >
        Очистить аналитику
    </button>

    <div id="reports_container"></div>`;
}

/* ---------- REPORTS ---------- */

async function loadReports() {

    const r = await fetch("/reports");

    const data = await r.json();

    let html = "";

    data.reverse().forEach(rep => {

        html += `

        <div class="search-card">

            <b>${rep.model}</b><br>

            Тип: ${rep.type}<br>

            Profit: ${rep.profit}<br>

            Дата: ${rep.created_at}

        </div>
        `;
    });

    document.getElementById(
        "reports_container"
    ).innerHTML = html;
}

/* ---------- CLEAR REPORTS ---------- */

async function clearReports() {

    if (!confirm("Очистить аналитику?"))
        return;

    await fetch("/reports/clear", {
        method:"DELETE"
    });

    alert("Очищено");

    loadAnalytics();
}

/* ---------- AUTH ---------- */

async function register() {

    const username =
        document.getElementById(
            "reg_username"
        ).value;

    const password =
        document.getElementById(
            "reg_password"
        ).value;

    const r = await fetch("/register", {

        method:"POST",

        headers:{
            "Content-Type":"application/json"
        },

        body: JSON.stringify({

            telegram_id: safeUserId(),

            username,

            password
        })
    });

    const d = await r.json();

    alert(d.message || "Регистрация успешна");
}

async function login() {

    const username =
        document.getElementById(
            "reg_username"
        ).value;

    const password =
        document.getElementById(
            "reg_password"
        ).value;

    const r = await fetch("/login", {

        method:"POST",

        headers:{
            "Content-Type":"application/json"
        },

        body: JSON.stringify({

            telegram_id: safeUserId(),

            username,

            password
        })
    });

    const d = await r.json();

    if (d.ok) {

        document.getElementById(
            "profile_info"
        ).innerHTML =

        `
        <p>ID: ${safeUserId()}</p>

        <p>Username: ${d.user.username}</p>

        <p>Role: ${d.user.role}</p>
        `;

        alert("Вход выполнен");

    } else {

        alert(d.message);
    }
}

/* ---------- ADMIN ---------- */

async function loadAdmin() {

    showTab("admin");

    const r = await fetch("/admin");

    const d = await r.json();

    let users = "";

    for (let id in d.users) {

        const u = d.users[id];

        users += `
            <p>
                ${u.username}
                (${u.role})
            </p>
        `;
    }

    document.getElementById(
        "admin"
    ).innerHTML =

    `<h3>Админ</h3>

    ${users}

    <p>
        Отчетов:
        ${d.reports.length}
    </p>`;
}

/* ---------- INIT ---------- */

renderParts();

</script>

</body>
</html>
