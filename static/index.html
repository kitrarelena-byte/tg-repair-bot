<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CRM</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0f172a;
    color: white;
}

.container { padding: 15px; }

.tabbar {
    display: flex;
    justify-content: space-around;
    background: #1e293b;
    padding: 10px;
}

.tab { cursor: pointer; }

.hidden { display: none; }

.card {
    background: #1e293b;
    padding: 15px;
    border-radius: 12px;
    margin-bottom: 15px;
}

input, select {
    width: 100%;
    padding: 10px;
    margin-top: 8px;
    border-radius: 8px;
    border: none;
}

button {
    margin-top: 10px;
    padding: 12px;
    width: 100%;
    border-radius: 10px;
    border: none;
    background: #22c55e;
}
</style>
</head>

<body>

<div class="tabbar">
    <div class="tab" onclick="showTab('sale')">Продажа</div>
    <div class="tab" onclick="showTab('repair')">Ремонт</div>
    <div class="tab" onclick="showTab('parts')">Запчасти</div>
    <div class="tab" onclick="loadAnalytics()">Аналитика</div>
    <div class="tab" onclick="loadReports()">Отчеты</div>
    <div class="tab" onclick="loadAdmin()">Админ</div>
</div>

<div class="container">

<div id="sale" class="card">
    <h3>Продажа</h3>
    <input id="sale_model" placeholder="Модель">
    <input id="sale_purchase" placeholder="Цена покупки">
    <input id="sale_repair" placeholder="Цена ремонта">
    <input id="sale_sell" placeholder="Цена продажи">
    <button onclick="sendSale()">Сохранить</button>
    <div id="sale_profit"></div>
</div>

<div id="repair" class="card hidden">
    <h3>Ремонт</h3>
    <input id="repair_model" placeholder="Модель">
    <select id="parts_select" multiple></select>
    <input id="repair_price" placeholder="Цена ремонта">
    <button onclick="sendRepair()">Сохранить</button>
</div>

<div id="parts" class="card hidden">
    <h3>Запчасти</h3>
    <input id="part_name" placeholder="Название">
    <input id="part_price" placeholder="Цена">
    <button onclick="addPart()">Добавить</button>
    <ul id="parts_list"></ul>
</div>

<div id="analytics" class="card hidden"></div>
<div id="reports" class="card hidden"></div>
<div id="admin" class="card hidden"></div>

</div>

<script>
const tg = window.Telegram?.WebApp;
if (tg) {
    tg.ready();
    tg.expand();
}

// ❗ FIX 1 — БЫЛА СИНТАКСИЧЕСКАЯ ОШИБКА
let parts = JSON.parse(localStorage.getItem("parts") || "[]");

function safeUserId() {
    return tg?.initDataUnsafe?.user?.id || "0";
}

function saveParts() {
    localStorage.setItem("parts", JSON.stringify(parts));
}

function renderParts() {
    const list = document.getElementById("parts_list");
    const select = document.getElementById("parts_select");

    list.innerHTML = "";
    select.innerHTML = "";

    parts.forEach((p, i) => {
        const li = document.createElement("li");
        li.innerText = p.name + " - " + p.price + " ❌";

        // ❗ удаление работает
        li.onclick = function () {
            parts.splice(i, 1);
            saveParts();
            renderParts();
        };

        list.appendChild(li);

        const opt = document.createElement("option");
        opt.value = JSON.stringify(p);
        opt.text = p.name;
        select.appendChild(opt);
    });
}

function addPart() {
    const name = document.getElementById("part_name").value;
    const price = document.getElementById("part_price").value;

    parts.push({name, price});
    saveParts();
    renderParts();
}

// ---------- SALE ----------
async function sendSale() {
    const res = await fetch("/report", {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({
            telegram_id: safeUserId(),
            type: "sale",
            model: document.getElementById("sale_model").value,
            purchase_price: Number(document.getElementById("sale_purchase").value),
            repair_cost: Number(document.getElementById("sale_repair").value),
            sell_price: Number(document.getElementById("sale_sell").value)
        })
    });

    const r = await res.json();
    document.getElementById("sale_profit").innerText = "Прибыль: " + r.profit;
}

// ---------- REPAIR ----------
async function sendRepair() {
    const selected = Array.from(document.getElementById("parts_select").selectedOptions)
        .map(o => JSON.parse(o.value));

    let partsSum = 0;
    selected.forEach(p => partsSum += Number(p.price));

    await fetch("/report", {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({
            telegram_id: safeUserId(),
            type: "repair",
            model: document.getElementById("repair_model").value,
            purchase_price: 0,
            repair_cost: Number(document.getElementById("repair_price").value) + partsSum,
            sell_price: 0
        })
    });

    alert("Сохранено");
}

// ---------- TABS ----------
function showTab(tab) {
    ["sale","repair","parts","analytics","reports","admin"].forEach(id=>{
        document.getElementById(id).classList.add("hidden");
    });

    document.getElementById(tab).classList.remove("hidden");
}

// ---------- ANALYTICS ----------
async function loadAnalytics() {
    showTab("analytics");

    const r = await fetch("/analytics");
    const d = await r.json();

    document.getElementById("analytics").innerHTML =
        "<h3>Аналитика</h3>" +
        "<p>Продажи: " + d.sales_profit + "</p>" +
        "<p>Ремонт: " + d.repairs_profit + "</p>" +
        "<p>Общая: " + d.total_profit + "</p>";
}

// ---------- REPORTS ----------
async function loadReports() {
    showTab("reports");

    const r = await fetch("/reports");
    const data = await r.json();

    let html = "<h3>Отчеты</h3>";

    data.forEach(r => {
        html += "<p>" + r.model + " | " + r.type + " | " + r.profit + "</p>";
    });

    document.getElementById("reports").innerHTML = html;
}

// ---------- ADMIN ----------
async function loadAdmin() {
    showTab("admin");

    const r = await fetch("/admin");
    const d = await r.json();

    let html = "<h3>Админ</h3>";

    Object.keys(d.users).forEach(u => {
        html += "<p>" + u + " (" + d.users[u].role + ")</p>";
    });

    html += "<p>Отчетов: " + d.reports.length + "</p>";

    document.getElementById("admin").innerHTML = html;
}

renderParts();
</script>

</body>
</html>
