<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>CRM</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>

body{
    margin:0;
    background:#0b1220;
    color:white;
    font-family:Arial;
}

.tabbar{
    display:flex;
    gap:10px;
    overflow-x:auto;
    padding:10px;
    background:#111827;
}

.tab{
    background:#1f2937;
    padding:10px 14px;
    border-radius:10px;
    cursor:pointer;
}

.container{
    padding:15px;
}

.card{
    background:#111827;
    padding:15px;
    border-radius:14px;
    margin-bottom:15px;
}

input,select{
    width:100%;
    margin-top:10px;
    padding:12px;
    border:none;
    border-radius:10px;
}

button{
    width:100%;
    padding:12px;
    margin-top:10px;
    border:none;
    border-radius:10px;
    background:#22c55e;
    color:white;
    font-weight:bold;
}

.del{
    background:#ef4444;
}

.hidden{
    display:none;
}

.search-card{
    background:#1f2937;
    padding:10px;
    border-radius:10px;
    margin-top:10px;
}

</style>

</head>

<body>

<div class="tabbar">

<div class="tab" onclick="showTab('sale')">📊 Продажа</div>

<div class="tab" onclick="showTab('repair')">🛠 Ремонт</div>

<div class="tab" onclick="showTab('parts')">🔩 Запчасти</div>

<div class="tab" onclick="loadAnalytics()">📈 Аналитика</div>

<div class="tab" onclick="loadProfile()">👤 Профиль</div>

</div>

<div class="container">

<div id="sale" class="card">

<h3>Продажа</h3>

<input id="sale_model" placeholder="Модель">

<input id="sale_purchase" placeholder="Цена покупки">

<input id="sale_repair" placeholder="Цена ремонта">

<input id="sale_sell" placeholder="Цена продажи">

<button onclick="sendSale()">Сохранить</button>

<div id="sale_profit"></div>

</div>

<div id="repair" class="card hidden">

<h3>Ремонт</h3>

<input id="repair_model" placeholder="Модель">

<select id="parts_select" multiple></select>

<input id="repair_price" placeholder="Цена работы">

<button onclick="sendRepair()">Сохранить</button>

</div>

<div id="parts" class="card hidden">

<h3>Запчасти</h3>

<input id="part_name" placeholder="Название">

<input id="part_price" placeholder="Цена">

<button onclick="addPart()">Добавить</button>

<hr>

<input id="search_query" placeholder="Поиск iparts">

<button onclick="searchParts()">Найти</button>

<div id="search_results"></div>

<ul id="parts_list"></ul>

</div>

<div id="analytics" class="card hidden"></div>

<div id="profile" class="card hidden"></div>

</div>

<script>

const tg = window.Telegram?.WebApp;

if(tg){
    tg.ready();
    tg.expand();
}

function safeUserId(){

    const user = tg?.initDataUnsafe?.user;

    if(user && user.id){
        return String(user.id);
    }

    let localId =
    localStorage.getItem("local_user_id");

    if(!localId){

        localId =
        "web_" +
        Math.random().toString(36).slice(2);

        localStorage.setItem(
            "local_user_id",
            localId
        );
    }

    return localId;
}

function showTab(tab){

    [
        "sale",
        "repair",
        "parts",
        "analytics",
        "profile"
    ].forEach(id=>{

        document
        .getElementById(id)
        .classList.add("hidden");

    });

    document
    .getElementById(tab)
    .classList.remove("hidden");
}

let parts =
JSON.parse(
    localStorage.getItem("parts") || "[]"
);

function saveParts(){
    localStorage.setItem(
        "parts",
        JSON.stringify(parts)
    );
}

function renderParts(){

    const list =
    document.getElementById("parts_list");

    const select =
    document.getElementById("parts_select");

    list.innerHTML = "";
    select.innerHTML = "";

    parts.forEach((p,i)=>{

        const li =
        document.createElement("li");

        li.innerHTML =
        `${p.name} - ${p.price}`;

        const del =
        document.createElement("button");

        del.innerText = "Удалить";
        del.className = "del";

        del.onclick = ()=>{

            parts.splice(i,1);

            saveParts();

            renderParts();
        };

        li.appendChild(del);

        list.appendChild(li);

        const opt =
        document.createElement("option");

        opt.value =
        JSON.stringify(p);

        opt.text = p.name;

        select.appendChild(opt);

    });
}

function addPart(){

    parts.push({

        name:
        document.getElementById(
            "part_name"
        ).value,

        price:
        document.getElementById(
            "part_price"
        ).value

    });

    saveParts();

    renderParts();
}

async function searchParts(){

    const q =
    document.getElementById(
        "search_query"
    ).value;

    const r =
    await fetch(
        "/parts/search?q=" +
        encodeURIComponent(q)
    );

    const data =
    await r.json();

    const container =
    document.getElementById(
        "search_results"
    );

    container.innerHTML = "";

    data.forEach(p=>{

        const div =
        document.createElement("div");

        div.className =
        "search-card";

        div.innerHTML =
        `<b>${p.name}</b><br>
        <small>${p.price}</small>`;

        const btn =
        document.createElement("button");

        btn.innerText = "Добавить";

        btn.onclick = ()=>{

            parts.push({
                name:p.name,
                price:p.price
            });

            saveParts();

            renderParts();
        };

        div.appendChild(btn);

        container.appendChild(div);

    });
}

async function sendSale(){

    const r = await fetch("/report",{

        method:"POST",

        headers:{
            "Content-Type":"application/json"
        },

        body:JSON.stringify({

            telegram_id:safeUserId(),

            type:"sale",

            model:
            document.getElementById(
                "sale_model"
            ).value,

            purchase_price:Number(
                document.getElementById(
                    "sale_purchase"
                ).value
            ),

            repair_cost:Number(
                document.getElementById(
                    "sale_repair"
                ).value
            ),

            sell_price:Number(
                document.getElementById(
                    "sale_sell"
                ).value
            )
        })
    });

    const data = await r.json();

    document.getElementById(
        "sale_profit"
    ).innerText =
    "Profit: " + data.profit;
}

async function sendRepair(){

    const selected =
    [...document.getElementById(
        "parts_select"
    ).selectedOptions]
    .map(o=>JSON.parse(o.value));

    let sum = 0;

    selected.forEach(p=>{
        sum += Number(p.price);
    });

    await fetch("/report",{

        method:"POST",

        headers:{
            "Content-Type":"application/json"
        },

        body:JSON.stringify({

            telegram_id:safeUserId(),

            type:"repair",

            model:
            document.getElementById(
                "repair_model"
            ).value,

            purchase_price:sum,

            repair_cost:Number(
                document.getElementById(
                    "repair_price"
                ).value
            ),

            sell_price:0
        })
    });

    alert("Сохранено");
}

async function loadAnalytics(){

    showTab("analytics");

    const r =
    await fetch("/analytics");

    const d =
    await r.json();

    const rr =
    await fetch("/reports");

    const reports =
    await rr.json();

    let reportsHtml = "";

    reports.forEach(r=>{

        reportsHtml += `
        <div class="search-card">
            <b>${r.type}</b><br>
            ${r.model}<br>
            Profit: ${r.profit}
        </div>
        `;
    });

    document.getElementById(
        "analytics"
    ).innerHTML = `

    <h3>Аналитика</h3>

    <p>Продажи:
    ${d.sales_profit}</p>

    <p>Ремонты:
    ${d.repairs_profit}</p>

    <p><b>Итого:
    ${d.total_profit}</b></p>

    <button onclick="clearAnalytics()">
    Очистить аналитику
    </button>

    <hr>

    ${reportsHtml}
    `;
}

async function clearAnalytics(){

    await fetch(
        "/analytics/clear",
        {
            method:"POST"
        }
    );

    loadAnalytics();
}

function logout(){

    localStorage.removeItem(
        "crm_logged"
    );

    localStorage.removeItem(
        "crm_username"
    );

    loadProfile();
}

function loadProfile(){

    showTab("profile");

    const logged =
    localStorage.getItem(
        "crm_logged"
    );

    if(logged){

        const username =
        localStorage.getItem(
            "crm_username"
        );

        document.getElementById(
            "profile"
        ).innerHTML = `

        <h3>Профиль</h3>

        <p>${username}</p>

        <button onclick="logout()">
        Выйти
        </button>
        `;

        return;
    }

    document.getElementById(
        "profile"
    ).innerHTML = `

    <h3>Регистрация</h3>

    <input id="reg_username"
    placeholder="Логин">

    <input id="reg_password"
    type="password"
    placeholder="Пароль">

    <button onclick="registerUser()">
    Зарегистрироваться
    </button>

    <hr>

    <h3>Логин</h3>

    <input id="login_username"
    placeholder="Логин">

    <input id="login_password"
    type="password"
    placeholder="Пароль">

    <button onclick="loginUser()">
    Войти
    </button>
    `;
}

async function registerUser(){

    const r = await fetch("/register",{

        method:"POST",

        headers:{
            "Content-Type":"application/json"
        },

        body:JSON.stringify({

            telegram_id:safeUserId(),

            username:
            document.getElementById(
                "reg_username"
            ).value,

            password:
            document.getElementById(
                "reg_password"
            ).value
        })
    });

    const data = await r.json();

    if(data.ok){

        alert("Аккаунт создан");

    }else{

        alert(data.error);
    }
}

async function loginUser(){

    const username =
    document.getElementById(
        "login_username"
    ).value;

    const r = await fetch("/login",{

        method:"POST",

        headers:{
            "Content-Type":"application/json"
        },

        body:JSON.stringify({

            telegram_id:safeUserId(),

            username:username,

            password:
            document.getElementById(
                "login_password"
            ).value
        })
    });

    const data = await r.json();

    if(data.ok){

        localStorage.setItem(
            "crm_logged",
            "1"
        );

        localStorage.setItem(
            "crm_username",
            username
        );

        loadProfile();

    }else{

        alert("Ошибка логина");
    }
}

renderParts();

</script>

</body>
</html>
