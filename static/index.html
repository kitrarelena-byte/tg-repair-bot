<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>CRM</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0f172a;
    color: white;
    overflow-x: hidden;
}

.container { padding: 15px; }

.tabbar {
    display: flex;
    justify-content: space-around;
    background: #1e293b;
    padding: 10px;
}

.tab { cursor: pointer; }

.hidden { display: none; }

.card {
    background: #1e293b;
    padding: 15px;
    border-radius: 12px;
    margin-bottom: 15px;
}

input, select {
    width: 100%;
    padding: 10px;
    margin-top: 8px;
    border-radius: 8px;
    border: none;
}

button {
    margin-top: 10px;
    padding: 12px;
    width: 100%;
    border-radius: 10px;
    border: none;
    background: #22c55e;
    font-weight: bold;
}

small { opacity: 0.7; }
</style>
</head>

<body>

<div class="tabbar">
    <div class="tab" onclick="showTab('sale')">📊 Продажа</div>
    <div class="tab" onclick="showTab('repair')">🛠 Ремонт</div>
    <div class="tab" onclick="showTab('parts')">🔩 Запчасти</div>
    <div class="tab" onclick="showTab('analytics')">📈 Аналитика</div>
    <div class="tab" onclick="loadAdmin()">👤 Админ</div>
</div>

<div class="container">

<!-- SALE -->
<div id="sale" class="card">
    <h3>Продажа</h3>
    <input id="sale_model" placeholder="Модель">
    <input id="sale_purchase" placeholder="Цена покупки">
    <input id="sale_repair" placeholder="Цена ремонта">
    <input id="sale_sell" placeholder="Цена продажи">
    <button onclick="sendSale()">Сохранить</button>
    <small id="sale_profit"></small>
</div>

<!-- REPAIR -->
<div id="repair" class="card hidden">
    <h3>Ремонт</h3>
    <input id="repair_model" placeholder="Модель">
    <select id="parts_select" multiple></select>
    <input id="repair_price" placeholder="Цена ремонта">
    <button onclick="sendRepair()">Сохранить</button>
</div>

<!-- PARTS -->
<div id="parts" class="card hidden">
    <h3>Запчасти</h3>
    <input id="part_name" placeholder="Название">
    <input id="part_price" placeholder="Цена">
    <button onclick="addPart()">Добавить</button>
    <ul id="parts_list"></ul>
</div>

<!-- ANALYTICS -->
<div id="analytics" class="card hidden"></div>

<!-- ADMIN -->
<div id="admin" class="card hidden"></div>

</div>

<script>
const tg = window.Telegram.WebApp;
tg.ready();
tg.expand();

const API = "";

let parts = JSON.parse(localStorage.getItem("parts") || "[]");

function safeUserId() {
    return tg?.initDataUnsafe?.user?.id || "0";
}

function saveParts() {
    localStorage.setItem("parts", JSON.stringify(parts));
}

function renderParts() {
    const list = document.getElementById("parts_list");
    const select = document.getElementById("parts_select");

    list.innerHTML = "";
    select.innerHTML = "";

    parts.forEach((p, i) => {
        const li = document.createElement("li");
        li.innerText = ${p.name} - ${p.price};

        li.onclick = () => {
            parts.splice(i,1);
            saveParts();
            renderParts();
        };

        list.appendChild(li);

        const opt = document.createElement("option");
        opt.value = JSON.stringify(p);
        opt.text = p.name;
        select.appendChild(opt);
    });
}

function addPart() {
    const name = document.getElementById("part_name").value;
    const price = document.getElementById("part_price").value;

    parts.push({name, price});
    saveParts();
    renderParts();
}

async function sendSale() {
    const data = {
        telegram_id: safeUserId(),
        type: "sale",
        model: sale_model.value,
        purchase_price: Number(sale_purchase.value),
        repair_cost: Number(sale_repair.value),
        sell_price: Number(sale_sell.value)
    };

    const res = await fetch("/report", {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify(data)
    });

    const r = await res.json();
    sale_profit.innerText = "💰 Profit: " + r.profit;
}

async function sendRepair() {
    const selected = [...parts_select.selectedOptions].map(o => JSON.parse(o.value));
    const partsSum = selected.reduce((s,p)=>s+Number(p.price),0);

    await fetch("/report", {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({
            telegram_id: safeUserId(),
            type: "repair",
            model: repair_model.value,
            purchase_price: 0,
            repair_cost: Number(repair_price.value) + partsSum,
            sell_price: 0
        })
    });

    alert("Ремонт сохранён");
}

async function loadAnalytics() {
    showTab("analytics");

    const r = await fetch("/analytics");
    const d = await r.json();

    analytics.innerHTML = `
        <h3>📈 Аналитика</h3>
        <p>Прибыль: ${d.total_profit}</p>
        <p>Продаж: ${d.sales_count}</p>
        <p>Ремонтов: ${d.repair_count}</p>
    `;
}

async function loadAdmin() {
    showTab("admin");

    const r = await fetch("/admin");
    const d = await r.json();

    admin.innerHTML = `
        <h3>👤 Админ</h3>
        <p>Users: ${Object.keys(d.users).length}</p>
        <p>Reports: ${d.reports.length}</p>
    `;
}

function showTab(tab) {
    ["sale","repair","parts","analytics","admin"].forEach(id=>{
        document.getElementById(id).classList.add("hidden");
    });
    document.getElementById(tab).classList.remove("hidden");
}

renderParts();
</script>

</body>
</html>
