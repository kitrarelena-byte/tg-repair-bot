<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
/>

<title>CRM</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>

html, body{
touch-action: manipulation;
overscroll-behavior: none;
}

body{
margin:0;
font-family:Arial;
background:#0b1220;
color:white;
zoom:1;
}

.tabbar{
display:flex;
overflow-x:auto;
background:#111827;
padding:10px;
gap:10px;
}

.tab{
padding:10px 14px;
background:#1f2937;
border-radius:10px;
cursor:pointer;
white-space:nowrap;
}

.container{
padding:15px;
}

.card{
background:#111827;
padding:15px;
border-radius:14px;
margin-bottom:15px;
}

input, select{
width:100%;
padding:10px;
margin-top:8px;
border-radius:8px;
border:none;
box-sizing:border-box;
}

button{
margin-top:10px;
padding:12px;
width:100%;
border-radius:10px;
border:none;
background:#22c55e;
font-weight:bold;
cursor:pointer;
}

.del{
background:#ef4444;
}

.hidden{
display:none;
}

.search-card{
background:#1f2937;
padding:10px;
margin-top:8px;
border-radius:10px;
}

</style>
</head>

<body>

<div class="tabbar">
<div class="tab" onclick="showTab('sale')">📊 Продажа</div>
<div class="tab" onclick="showTab('repair')">🛠 Ремонт</div>
<div class="tab" onclick="showTab('parts')">🔩 Запчасти</div>
<div class="tab" onclick="loadAnalytics()">📈 Аналитика</div>
<div class="tab" onclick="loadProfile()">👤 Профиль</div>
<div class="tab" onclick="loadAdmin()">⚙️ Админ</div>
</div>

<div class="container">

<div id="sale" class="card">
<h3>Продажа</h3>
</div>

<div id="repair" class="card hidden">
<h3>Ремонт</h3>
</div>

<div id="parts" class="card hidden">
<h3>Запчасти</h3>
</div>

<div id="analytics" class="card hidden"></div>

<div id="profile" class="card hidden"></div>

<div id="admin" class="card hidden"></div>

</div>

<script>

document.addEventListener('gesturestart', function (e) {
e.preventDefault();
});

document.addEventListener('dblclick', function (e) {
e.preventDefault();
}, { passive: false });

const tg = window.Telegram?.WebApp;

if(tg){
tg.ready();
tg.expand();
}

function safeUserId(){
return tg?.initDataUnsafe?.user?.id || "0";
}

function showTab(tab){

["sale","repair","parts","analytics","profile","admin"]
.forEach(id=>{
document.getElementById(id).classList.add("hidden");
});

document.getElementById(tab).classList.remove("hidden");
}

function logout(){

localStorage.removeItem("crm_user");

loadProfile();
}

async function register(){

const username =
document.getElementById("reg_username").value;

const password =
document.getElementById("reg_password").value;

const res = await fetch("/register",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
telegram_id:safeUserId(),
username,
password
})
});

const data = await res.json();

if(data.detail){
alert(data.detail);
return;
}

localStorage.setItem("crm_user", JSON.stringify(data));

loadProfile();
}

async function login(){

const username =
document.getElementById("login_username").value;

const password =
document.getElementById("login_password").value;

const res = await fetch("/login",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
telegram_id:safeUserId(),
username,
password
})
});

const data = await res.json();

if(data.detail){
alert(data.detail);
return;
}

localStorage.setItem("crm_user", JSON.stringify(data));

loadProfile();
}

function loadProfile(){

showTab("profile");

const user =
JSON.parse(localStorage.getItem("crm_user"));

if(user){

document.getElementById("profile").innerHTML = `
<h3>Профиль</h3>

<p>Логин: ${user.username}</p>

<p>Роль: ${user.role}</p>

<button onclick="logout()" class="del">
Выйти
</button>
`;

}else{

document.getElementById("profile").innerHTML = `

<h3>Регистрация</h3>

<input id="reg_username" placeholder="Логин">

<input
id="reg_password"
type="password"
placeholder="Пароль"
>

<button onclick="register()">
Создать аккаунт
</button>

<hr>

<h3>Вход</h3>

<input id="login_username" placeholder="Логин">

<input
id="login_password"
type="password"
placeholder="Пароль"
>

<button onclick="login()">
Войти
</button>

`;
}
}

async function loadAdmin(){

showTab("admin");

const user =
JSON.parse(localStorage.getItem("crm_user"));

if(!user || user.role !== "admin"){

document.getElementById("admin").innerHTML =
"<h3>Нет доступа</h3>";

return;
}

const r = await fetch("/users");
const users = await r.json();

let html = "<h3>Пользователи</h3>";

users.forEach(u=>{

html += `

<div class="search-card">

<b>${u.username}</b><br>

Role: ${u.role}<br>

Blocked: ${u.blocked}<br>

<button onclick="blockUser('${u.username}')">
Блок
</button>

<button onclick="unblockUser('${u.username}')">
Разблок
</button>

</div>

`;

});

document.getElementById("admin").innerHTML = html;
}

async function blockUser(username){

await fetch("/admin/block",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({username})
});

loadAdmin();
}

async function unblockUser(username){

await fetch("/admin/unblock",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({username})
});

loadAdmin();
}

loadProfile();

</script>

</body>
</html>
