<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
/>

<title>CRM</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>

html, body{
touch-action: manipulation;
overscroll-behavior: none;
}

body{
margin:0;
font-family:Arial;
background:#0b1220;
color:white;
}

.tabbar{
display:flex;
overflow-x:auto;
background:#111827;
padding:10px;
gap:10px;
}

.tab{
padding:10px 14px;
background:#1f2937;
border-radius:10px;
cursor:pointer;
white-space:nowrap;
}

.container{
padding:15px;
}

.card{
background:#111827;
padding:15px;
border-radius:14px;
margin-bottom:15px;
}

input, select{
width:100%;
padding:10px;
margin-top:8px;
border-radius:8px;
border:none;
box-sizing:border-box;
}

button{
margin-top:10px;
padding:12px;
width:100%;
border-radius:10px;
border:none;
background:#22c55e;
font-weight:bold;
cursor:pointer;
}

.del{
background:#ef4444;
}

.hidden{
display:none;
}

.search-card{
background:#1f2937;
padding:10px;
margin-top:8px;
border-radius:10px;
}

</style>
</head>

<body>

<div class="tabbar">
<div class="tab" onclick="showTab('sale')">📊 Продажа</div>
<div class="tab" onclick="showTab('repair')">🛠 Ремонт</div>
<div class="tab" onclick="showTab('parts')">🔩 Запчасти</div>
<div class="tab" onclick="loadAnalytics()">📈 Аналитика</div>
<div class="tab" onclick="loadProfile()">👤 Профиль</div>
<div class="tab" onclick="loadAdmin()">⚙️ Админ</div>
</div>

<div class="container">

<!-- SALE -->
<div id="sale" class="card">

<h3>Продажа</h3>

<input id="sale_model" placeholder="Модель">

<input id="sale_purchase" placeholder="Цена покупки">

<input id="sale_repair" placeholder="Цена ремонта">

<input id="sale_sell" placeholder="Цена продажи">

<button onclick="sendSale()">
Сохранить
</button>

<div id="sale_profit"></div>

</div>

<!-- REPAIR -->
<div id="repair" class="card hidden">

<h3>Ремонт</h3>

<input id="repair_model" placeholder="Модель">

<select id="parts_select" multiple></select>

<input id="repair_price" placeholder="Цена работы">

<button onclick="sendRepair()">
Сохранить
</button>

</div>

<!-- PARTS -->
<div id="parts" class="card hidden">

<h3>Запчасти</h3>

<input id="part_name" placeholder="Название">

<input id="part_price" placeholder="Цена">

<button onclick="addPart()">
Добавить
</button>

<hr>

<input id="search_query" placeholder="Поиск iparts">

<button onclick="searchParts()">
Найти
</button>

<div id="search_results"></div>

<ul id="parts_list"></ul>

</div>

<!-- ANALYTICS -->
<div id="analytics" class="card hidden"></div>

<!-- PROFILE -->
<div id="profile" class="card hidden"></div>

<!-- ADMIN -->
<div id="admin" class="card hidden"></div>

</div>

<script>

document.addEventListener('gesturestart', function (e) {
e.preventDefault();
});

document.addEventListener('dblclick', function (e) {
e.preventDefault();
}, { passive: false });

const tg = window.Telegram?.WebApp;

if(tg){
tg.ready();
tg.expand();
}

function safeUserId(){
return tg?.initDataUnsafe?.user?.id || "0";
}

function showTab(tab){

["sale","repair","parts","analytics","profile","admin"]
.forEach(id=>{
document.getElementById(id).classList.add("hidden");
});

document.getElementById(tab).classList.remove("hidden");
}

let parts = JSON.parse(localStorage.getItem("parts") || "[]");

function saveParts(){
localStorage.setItem("parts", JSON.stringify(parts));
}

function renderParts(){

const list = document.getElementById("parts_list");
const select = document.getElementById("parts_select");

list.innerHTML = "";
select.innerHTML = "";

parts.forEach((p,i)=>{

const li = document.createElement("li");

li.innerHTML = `
${p.name} - ${p.price}
`;

const del = document.createElement("button");

del.innerText = "Удалить";
del.className = "del";

del.onclick = ()=>{

parts.splice(i,1);

saveParts();

renderParts();
};

li.appendChild(del);

list.appendChild(li);

const opt = document.createElement("option");

opt.value = JSON.stringify(p);

opt.text = p.name;

select.appendChild(opt);

});
}

function addPart(){

parts.push({
name: document.getElementById("part_name").value,
price: document.getElementById("part_price").value
});

saveParts();

renderParts();
}

async function searchParts(){

const q =
document.getElementById("search_query").value;

const r =
await fetch("/parts/search?q=" + encodeURIComponent(q));

const data = await r.json();

const container =
document.getElementById("search_results");

container.innerHTML = "";

data.forEach(p=>{

const div = document.createElement("div");

div.className = "search-card";

div.innerHTML = `
<b>${p.name}</b><br>
${p.price}
`;

const btn = document.createElement("button");

btn.innerText = "Добавить";

btn.onclick = ()=>{

parts.push({
name:p.name,
price:p.price
});

saveParts();

renderParts();
};

div.appendChild(btn);

container.appendChild(div);

});
}

async function sendSale(){

const res = await fetch("/report",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
telegram_id:safeUserId(),
type:"sale",
model:document.getElementById("sale_model").value,
purchase_price:Number(document.getElementById("sale_purchase").value),
repair_cost:Number(document.getElementById("sale_repair").value),
sell_price:Number(document.getElementById("sale_sell").value)
})
});

const r = await res.json();

document.getElementById("sale_profit").innerText =
"Profit: " + r.profit;
}

async function sendRepair(){

const selected =
[...document.getElementById("parts_select").selectedOptions]
.map(o=>JSON.parse(o.value));

let partsSum = 0;

selected.forEach(p=>{
partsSum += Number(p.price);
});

await fetch("/report",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
telegram_id:safeUserId(),
type:"repair",
model:document.getElementById("repair_model").value,
purchase_price:partsSum,
repair_cost:Number(document.getElementById("repair_price").value),
sell_price:0
})
});

alert("Сохранено");
}

async function loadAnalytics(){

showTab("analytics");

const r = await fetch("/analytics");

const d = await r.json();

document.getElementById("analytics").innerHTML = `
<h3>Аналитика</h3>

<p>Продажи: ${d.sales_profit}</p>

<p>Ремонт: ${d.repairs_profit}</p>

<p><b>Итого: ${d.total_profit}</b></p>
`;
}

function logout(){

localStorage.removeItem("crm_user");

loadProfile();
}

async function register(){

const username =
document.getElementById("reg_username").value;

const password =
document.getElementById("reg_password").value;

const res = await fetch("/register",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
telegram_id:safeUserId(),
username,
password
})
});

const data = await res.json();

if(data.detail){
alert(data.detail);
return;
}

localStorage.setItem("crm_user", JSON.stringify(data));

loadProfile();
}

async function login(){

const username =
document.getElementById("login_username").value;

const password =
document.getElementById("login_password").value;

const res = await fetch("/login",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
telegram_id:safeUserId(),
username,
password
})
});

const data = await res.json();

if(data.detail){
alert(data.detail);
return;
}

localStorage.setItem("crm_user", JSON.stringify(data));

loadProfile();
}

function loadProfile(){

showTab("profile");

const user =
JSON.parse(localStorage.getItem("crm_user"));

if(user){

document.getElementById("profile").innerHTML = `
<h3>Профиль</h3>

<p>Логин: ${user.username}</p>

<p>Роль: ${user.role}</p>

<button onclick="logout()" class="del">
Выйти
</button>
`;

}else{

document.getElementById("profile").innerHTML = `

<h3>Регистрация</h3>

<input id="reg_username" placeholder="Логин">

<input
id="reg_password"
type="password"
placeholder="Пароль"
>

<button onclick="register()">
Создать аккаунт
</button>

<hr>

<h3>Вход</h3>

<input id="login_username" placeholder="Логин">

<input
id="login_password"
type="password"
placeholder="Пароль"
>

<button onclick="login()">
Войти
</button>

`;
}
}

async function loadAdmin(){

showTab("admin");

const user =
JSON.parse(localStorage.getItem("crm_user"));

if(!user || user.role !== "admin"){

document.getElementById("admin").innerHTML =
"<h3>Нет доступа</h3>";

return;
}

const r = await fetch("/users");

const users = await r.json();

let html = "<h3>Пользователи</h3>";

users.forEach(u=>{

html += `

<div class="search-card">

<b>${u.username}</b><br>

Role: ${u.role}<br>

Blocked: ${u.blocked}<br>

<button onclick="blockUser('${u.username}')">
Блок
</button>

<button onclick="unblockUser('${u.username}')">
Разблок
</button>

</div>

`;

});

document.getElementById("admin").innerHTML = html;
}

async function blockUser(username){

await fetch("/admin/block",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({username})
});

loadAdmin();
}

async function unblockUser(username){

await fetch("/admin/unblock",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({username})
});

loadAdmin();
}

renderParts();

loadProfile();

</script>

</body>
</html>
