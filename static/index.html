<!-- static/index.html -->

<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
/>

<title>CRM</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>

html, body{
touch-action: manipulation;
overscroll-behavior: none;
background:#0b1220;
}

body{
margin:0;
font-family:Arial;
background:#0b1220;
color:white;
}

.tabbar{
display:flex;
overflow-x:auto;
background:#111827;
padding:10px;
gap:10px;
}

.tab{
padding:10px 14px;
background:#1f2937;
border-radius:10px;
cursor:pointer;
white-space:nowrap;
font-size:14px;
}

.container{
padding:15px;
}

.card{
background:#111827;
padding:15px;
border-radius:16px;
margin-bottom:15px;
}

input, select{
width:100%;
padding:12px;
margin-top:8px;
border-radius:10px;
border:none;
box-sizing:border-box;
background:#1f2937;
color:white;
}

button{
margin-top:10px;
padding:12px;
width:100%;
border-radius:10px;
border:none;
background:#22c55e;
font-weight:bold;
cursor:pointer;
color:white;
}

.del{
background:#ef4444;
}

.hidden{
display:none;
}

.search-card{
background:#1f2937;
padding:12px;
margin-top:8px;
border-radius:12px;
}

.profile-header{
display:flex;
align-items:center;
gap:12px;
background:#1f2937;
padding:12px;
border-radius:16px;
margin-bottom:15px;
}

.avatar{
width:60px;
height:60px;
border-radius:50%;
object-fit:cover;
background:#111827;
border:2px solid #374151;
}

.profile-info{
flex:1;
overflow:hidden;
}

.profile-name{
font-size:18px;
font-weight:bold;
white-space:nowrap;
overflow:hidden;
text-overflow:ellipsis;
}

.profile-sub{
font-size:13px;
opacity:0.8;
margin-top:3px;
white-space:nowrap;
overflow:hidden;
text-overflow:ellipsis;
}

.profile-role{
margin-top:6px;
font-size:12px;
background:#374151;
display:inline-block;
padding:4px 8px;
border-radius:999px;
}

.admin-user{
background:#1f2937;
padding:12px;
border-radius:12px;
margin-top:10px;
}

hr{
border:none;
border-top:1px solid #374151;
margin:15px 0;
}

</style>
</head>

<body>

<div class="tabbar">
<div class="tab" onclick="showTab('sale')">📊 Продажа</div>
<div class="tab" onclick="showTab('repair')">🛠 Ремонт</div>
<div class="tab" onclick="showTab('parts')">🔩 Запчасти</div>
<div class="tab" onclick="loadProfile()">👤 Профиль</div>
</div>

<div class="container">

<!-- SALE -->
<div id="sale" class="card">

<h3>Продажа</h3>

<input id="sale_model" placeholder="Модель">

<input id="sale_purchase" placeholder="Цена покупки">

<input id="sale_repair" placeholder="Цена ремонта">

<input id="sale_sell" placeholder="Цена продажи">

<button onclick="sendSale()">
Сохранить
</button>

<div id="sale_profit"></div>

</div>

<!-- REPAIR -->
<div id="repair" class="card hidden">

<h3>Ремонт</h3>

<input id="repair_model" placeholder="Модель">

<select id="parts_select" multiple></select>

<input id="repair_price" placeholder="Цена работы">

<button onclick="sendRepair()">
Сохранить
</button>

</div>

<!-- PARTS -->
<div id="parts" class="card hidden">

<h3>Запчасти</h3>

<input id="part_name" placeholder="Название">

<input id="part_price" placeholder="Цена">

<button onclick="addPart()">
Добавить
</button>

<hr>

<input id="search_query" placeholder="Поиск iparts">

<button onclick="searchParts()">
Найти
</button>

<div id="search_results"></div>

<ul id="parts_list"></ul>

</div>

<!-- PROFILE -->
<div id="profile" class="card hidden"></div>

</div>

<script>

const tg = window.Telegram?.WebApp;

if(tg){
tg.ready();
tg.expand();
disableVerticalSwipes();
}

function safeUserId(){
return String(tg?.initDataUnsafe?.user?.id || "0");
}

function tgUsername(){
return tg?.initDataUnsafe?.user?.username || "";
}

function tgPhoto(){
return tg?.initDataUnsafe?.user?.photo_url || "";
}

function storageKey(){
return "crm_user_" + safeUserId();
}

function getCurrentUser(){
return JSON.parse(localStorage.getItem(storageKey()));
}

function saveCurrentUser(data){
localStorage.setItem(storageKey(), JSON.stringify(data));
}

function disableVerticalSwipes(){
document.body.addEventListener("touchmove", function(e){
if(e.scale !== 1){
e.preventDefault();
}
},{ passive:false });
}

function showTab(tab){

const user = getCurrentUser();

if(!user && tab !== "profile"){
loadProfile();
return;
}

[
"sale",
"repair",
"parts",
"profile"
].forEach(id=>{
document.getElementById(id).classList.add("hidden");
});

document.getElementById(tab).classList.remove("hidden");
}

/* =========================================
PARTS
========================================= */

let parts =
JSON.parse(localStorage.getItem("parts") || "[]");

function saveParts(){
localStorage.setItem("parts", JSON.stringify(parts));
}

function renderParts(){

const list = document.getElementById("parts_list");

const select =
document.getElementById("parts_select");

list.innerHTML = "";
select.innerHTML = "";

parts.forEach((p,i)=>{

const li = document.createElement("li");

li.innerHTML = `${p.name} - ${p.price}`;

const del = document.createElement("button");

del.innerText = "Удалить";

del.className = "del";

del.onclick = ()=>{

parts.splice(i,1);

saveParts();

renderParts();
};

li.appendChild(del);

list.appendChild(li);

const opt = document.createElement("option");

opt.value = JSON.stringify(p);

opt.text = p.name;

select.appendChild(opt);

});
}

function addPart(){

parts.push({
name:document.getElementById("part_name").value,
price:document.getElementById("part_price").value
});

saveParts();

renderParts();
}

/* =========================================
IPARTS
========================================= */

async function searchParts(){

const q =
document.getElementById("search_query").value;

const r =
await fetch("/parts/search?q=" + encodeURIComponent(q));

const data = await r.json();

const container =
document.getElementById("search_results");

container.innerHTML = "";

data.forEach(p=>{

const div = document.createElement("div");

div.className = "search-card";

div.innerHTML = `
<b>${p.name}</b><br>
${p.price}
`;

const btn = document.createElement("button");

btn.innerText = "Добавить";

btn.onclick = ()=>{

parts.push({
name:p.name,
price:p.price
});

saveParts();

renderParts();
};

div.appendChild(btn);

container.appendChild(div);

});
}

/* =========================================
SALE
========================================= */

async function sendSale(){

const res = await fetch("/report",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
telegram_id:safeUserId(),
type:"sale",
model:document.getElementById("sale_model").value,
purchase_price:Number(document.getElementById("sale_purchase").value),
repair_cost:Number(document.getElementById("sale_repair").value),
sell_price:Number(document.getElementById("sale_sell").value)
})
});

const r = await res.json();

if(r.detail){
alert(r.detail);
return;
}

document.getElementById("sale_profit").innerText =
"Profit: " + r.profit;
}

/* =========================================
REPAIR
========================================= */

async function sendRepair(){

const selected =
[...document.getElementById("parts_select").selectedOptions]
.map(o=>JSON.parse(o.value));

let partsSum = 0;

selected.forEach(p=>{
partsSum += Number(p.price);
});

const res = await fetch("/report",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
telegram_id:safeUserId(),
type:"repair",
model:document.getElementById("repair_model").value,
purchase_price:partsSum,
repair_cost:Number(document.getElementById("repair_price").value),
sell_price:0
})
});

const r = await res.json();

if(r.detail){
alert(r.detail);
return;
}

alert("Сохранено");
}

/* =========================================
AUTH
========================================= */

function logout(){

localStorage.removeItem(storageKey());

loadProfile();
}

async function register(){

const username =
document.getElementById("reg_username").value;

const password =
document.getElementById("reg_password").value;

const res = await fetch("/register",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
telegram_id:safeUserId(),
telegram_username:tgUsername(),
username,
password
})
});

const data = await res.json();

if(data.detail){
alert(data.detail);
return;
}

saveCurrentUser(data);

loadProfile();
}

async function login(){

const username =
document.getElementById("login_username").value;

const password =
document.getElementById("login_password").value;

const res = await fetch("/login",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
telegram_id:safeUserId(),
username,
password
})
});

const data = await res.json();

if(data.detail){
alert(data.detail);
return;
}

saveCurrentUser(data);

loadProfile();
}

/* =========================================
AVATAR
========================================= */

async function uploadAvatar(input){

const file = input.files[0];

if(!file){
return;
}

const formData = new FormData();

formData.append("telegram_id", safeUserId());
formData.append("avatar", file);

try{

const res = await fetch("/upload-avatar",{
method:"POST",
body:formData
});

const data = await res.json();

if(data.detail){
alert(data.detail);
return;
}

const user = getCurrentUser();

user.avatar = data.avatar;

saveCurrentUser(user);

loadProfile();

}catch(e){

alert("Ошибка загрузки");

}
}

/* =========================================
PROFILE
========================================= */

async function loadProfile(){

showTab("profile");

const user = getCurrentUser();

if(user){

const analyticsRes = await fetch("/analytics");
const analytics = await analyticsRes.json();

const reportsRes = await fetch("/reports");
const reports = await reportsRes.json();

let history = "";

reports.reverse().forEach(r=>{

history += `
<div class="search-card">
<b>${r.type.toUpperCase()}</b><br>
Модель: ${r.model}<br>
Профит: ${r.profit}<br>
Дата: ${r.created_at}
</div>
`;

});

let adminPanel = "";

if(user.role === "admin"){

adminPanel = `
<hr>

<h3>Пользователи</h3>

<div id="admin_users"></div>
`;

loadUsersRealtime();
}

document.getElementById("profile").innerHTML = `

<div class="profile-header">

<img
class="avatar"
src="${user.avatar || tgPhoto() || 'https://via.placeholder.com/60'}"
/>

<div class="profile-info">

<div class="profile-name">
${user.username}
</div>

<div class="profile-sub">
@${user.telegram_username || tgUsername() || "telegram"}
</div>

<div class="profile-role">
${user.role}
</div>

</div>

</div>

<input
type="file"
accept="image/*"
onchange="uploadAvatar(this)"
>

<button onclick="logout()" class="del">
Выйти
</button>

<hr>

<h3>Моя аналитика</h3>

<p>Продажи: ${analytics.sales_profit}</p>

<p>Ремонт: ${analytics.repairs_profit}</p>

<p><b>Итого: ${analytics.total_profit}</b></p>

<button onclick="clearAnalytics()" class="del">
Очистить аналитику
</button>

<hr>

<h3>История</h3>

${history}

${adminPanel}
`;

}else{

document.getElementById("profile").innerHTML = `

<h3>Регистрация</h3>

<input id="reg_username" placeholder="Логин">

<input
id="reg_password"
type="password"
placeholder="Пароль"
>

<button onclick="register()">
Создать аккаунт
</button>

<hr>

<h3>Вход</h3>

<input id="login_username" placeholder="Логин">

<input
id="login_password"
type="password"
placeholder="Пароль"
>

<button onclick="login()">
Войти
</button>

`;
}
}

/* =========================================
ADMIN
========================================= */

async function loadUsersRealtime(){

const user = getCurrentUser();

if(!user || user.role !== "admin"){
return;
}

const r = await fetch("/users");

const users = await r.json();

let html = "";

users.forEach(u=>{

html += `

<div class="admin-user">

<b>${u.username}</b><br>

@${u.telegram_username || "telegram"}<br>

Role: ${u.role}<br>

Blocked: ${u.blocked}

<button onclick="blockUser('${u.username}')">
Блок
</button>

<button onclick="unblockUser('${u.username}')">
Разблок
</button>

<button
class="del"
onclick="deleteUser('${u.username}')"
>
Удалить
</button>

</div>

`;

});

const el = document.getElementById("admin_users");

if(el){
el.innerHTML = html;
}
}

async function blockUser(username){

await fetch("/admin/block",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({username})
});

loadUsersRealtime();
}

async function unblockUser(username){

await fetch("/admin/unblock",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({username})
});

loadUsersRealtime();
}

async function deleteUser(username){

await fetch("/admin/delete",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({username})
});

loadUsersRealtime();
}

/* =========================================
CLEAR ANALYTICS
========================================= */

async function clearAnalytics(){

await fetch("/clear-reports",{
method:"POST"
});

loadProfile();
}

/* =========================================
INIT
========================================= */

renderParts();

loadProfile();

setInterval(()=>{
const user = getCurrentUser();

if(user?.role === "admin"){
loadUsersRealtime();
}
},3000);

</script>

</body>
</html>
