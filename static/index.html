<!DOCTYPE html>
<html lang="ru">

<head>

<meta charset="UTF-8">

<title>CRM</title>

<style>

body{
    background:#111;
    color:white;
    font-family:Arial;
    padding:20px;
}

input,
select,
button{
    width:100%;
    padding:12px;
    margin-top:10px;
    border:none;
    border-radius:10px;
}

button{
    background:#00bcd4;
    color:white;
    cursor:pointer;
}

.card{
    background:#1d1d1d;
    padding:15px;
    border-radius:15px;
    margin-top:15px;
}

</style>

</head>

<body>

<h1>CRM</h1>

<div class="card">

<h2>Регистрация</h2>

<input
    id="reg_username"
    placeholder="Логин"
>

<input
    id="reg_password"
    type="password"
    placeholder="Пароль"
>

<button onclick="registerUser()">
    Зарегистрироваться
</button>

</div>

<div class="card">

<h2>Ремонт / Продажа</h2>

<select id="type">
    <option value="repair">
        Ремонт
    </option>

    <option value="sale">
        Продажа
    </option>
</select>

<input
    id="model"
    placeholder="Модель"
>

<input
    id="purchase_price"
    type="number"
    placeholder="Цена закупки"
>

<input
    id="repair_cost"
    type="number"
    placeholder="Цена ремонта"
>

<input
    id="sell_price"
    type="number"
    placeholder="Цена продажи"
>

<button onclick="saveReport()">
    Сохранить
</button>

</div>

<div class="card">

<h2>Поиск запчастей</h2>

<input
    id="part_query"
    placeholder="Например: дисплей iphone 13"
>

<button onclick="searchParts()">
    Искать
</button>

<div id="parts"></div>

</div>

<div class="card">

<h2>Аналитика</h2>

<button onclick="loadAnalytics()">
    Обновить аналитику
</button>

<button onclick="loadHistory()">
    История
</button>

<button onclick="clearAnalytics()">
    Очистить аналитику
</button>

<div id="analytics"></div>

<div id="history"></div>

</div>

<script>

async function registerUser(){

    const username =
        document.getElementById(
            "reg_username"
        ).value

    const password =
        document.getElementById(
            "reg_password"
        ).value

    const r = await fetch(
        "/register",
        {
            method:"POST",

            headers:{
                "Content-Type":"application/json"
            },

            body:JSON.stringify({
                username,
                password
            })
        }
    )

    const data = await r.json()

    if(data.ok){

        alert("Регистрация успешна")

    }else{

        alert(
            data.detail || "Ошибка"
        )
    }
}

async function saveReport(){

    const body = {

        type:
            document.getElementById(
                "type"
            ).value,

        model:
            document.getElementById(
                "model"
            ).value,

        purchase_price:
            Number(
                document.getElementById(
                    "purchase_price"
                ).value
            ),

        repair_cost:
            Number(
                document.getElementById(
                    "repair_cost"
                ).value
            ),

        sell_price:
            Number(
                document.getElementById(
                    "sell_price"
                ).value
            )
    }

    const r = await fetch(
        "/report",
        {
            method:"POST",

            headers:{
                "Content-Type":"application/json"
            },

            body:JSON.stringify(body)
        }
    )

    const data = await r.json()

    alert(
        "Сохранено. Прибыль: "
        + data.profit
    )

    loadAnalytics()
}

async function loadAnalytics(){

    const r = await fetch(
        "/analytics"
    )

    const data = await r.json()

    document.getElementById(
        "analytics"
    ).innerHTML = `

        <p>
        Продаж:
        ${data.sales_count}
        </p>

        <p>
        Ремонтов:
        ${data.repairs_count}
        </p>

        <p>
        Прибыль продаж:
        ${data.sales_profit}
        </p>

        <p>
        Расходы ремонтов:
        ${data.repairs_profit}
        </p>

        <h3>
        Общая прибыль:
        ${data.total_profit}
        </h3>
    `
}

async function loadHistory(){

    const r = await fetch(
        "/analytics/history"
    )

    const data = await r.json()

    let html = `
        <h3>Ремонты</h3>
    `

    data.repairs.forEach(r=>{

        html += `
            <div>
                🔧 ${r.model}
                | ${r.profit}
            </div>
        `
    })

    html += `
        <h3>Продажи</h3>
    `

    data.sales.forEach(s=>{

        html += `
            <div>
                📱 ${s.model}
                | ${s.profit}
            </div>
        `
    })

    document.getElementById(
        "history"
    ).innerHTML = html
}

async function clearAnalytics(){

    if(
        !confirm(
            "Очистить аналитику?"
        )
    ) return

    await fetch(
        "/analytics/clear",
        {
            method:"DELETE"
        }
    )

    alert("Очищено")

    loadAnalytics()

    document.getElementById(
        "history"
    ).innerHTML = ""
}

async function searchParts(){

    const q =
        document.getElementById(
            "part_query"
        ).value

    const r = await fetch(
        `/parts/search?q=${q}`
    )

    const data = await r.json()

    let html = ""

    data.forEach(item=>{

        html += `
            <div class="card">
                <b>${item.name}</b>
                <br>
                💰 ${item.price}
            </div>
        `
    })

    document.getElementById(
        "parts"
    ).innerHTML = html
}

loadAnalytics()

</script>

</body>
</html>
