<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>CRM</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0f172a;
    color: white;
}

/* TOP BAR */
.tabbar {
    display: flex;
    overflow-x: auto;
    gap: 10px;
    padding: 10px;
    background: #1e293b;
    position: sticky;
    top: 0;
}

.tab {
    background: #334155;
    padding: 8px 14px;
    border-radius: 10px;
    white-space: nowrap;
    cursor: pointer;
    font-size: 14px;
}

/* CONTAINER */
.container { padding: 15px; }

.hidden { display: none; }

.card {
    background: #1e293b;
    padding: 15px;
    border-radius: 12px;
    margin-bottom: 15px;
}

input, select {
    width: 100%;
    padding: 10px;
    margin-top: 8px;
    border-radius: 8px;
    border: none;
    outline: none;
}

input::placeholder {
    color: #94a3b8;
}

button {
    margin-top: 10px;
    padding: 12px;
    width: 100%;
    border-radius: 10px;
    border: none;
    background: #22c55e;
    font-weight: bold;
}

.delete {
    background: #ef4444;
    margin-left: 10px;
    width: auto;
    padding: 5px 10px;
    font-size: 12px;
}
</style>
</head>

<body>

<div class="tabbar">
    <div class="tab" onclick="showTab('sale')">📊 Продажа</div>
    <div class="tab" onclick="showTab('repair')">🛠 Ремонт</div>
    <div class="tab" onclick="showTab('parts')">🔩 Запчасти</div>
    <div class="tab" onclick="loadAnalytics('analytics')">📈 Аналитика</div>
    <div class="tab" onclick="loadAdmin()">👤 Админ</div>
    <div class="tab" onclick="loadProfile()">👤 Профиль</div>
</div>

<div class="container">

<!-- SALE -->
<div id="sale" class="card">
    <h3>Продажа</h3>

    <input id="sale_model" placeholder="Модель">
    <input id="sale_purchase" placeholder="Цена покупки">
    <input id="sale_repair" placeholder="Цена ремонта">
    <input id="sale_sell" placeholder="Цена продажи">

    <button onclick="sendSale()">Сохранить</button>
    <div id="sale_profit"></div>
</div>

<!-- REPAIR -->
<div id="repair" class="card hidden">
    <h3>Ремонт</h3>

    <input id="repair_model" placeholder="Модель">
    <select id="parts_select" multiple></select>
    <input id="repair_price" placeholder="Цена ремонта">

    <button onclick="sendRepair()">Сохранить</button>
</div>

<!-- PARTS -->
<div id="parts" class="card hidden">
    <h3>Запчасти</h3>

    <input id="part_name" placeholder="Название запчасти">
    <input id="part_price" placeholder="Цена">

    <button onclick="addPart()">Добавить</button>

    <ul id="parts_list"></ul>
</div>

<!-- ANALYTICS -->
<div id="analytics" class="card hidden"></div>

<!-- ADMIN -->
<div id="admin" class="card hidden"></div>

<!-- PROFILE -->
<div id="profile" class="card hidden"></div>

</div>

<script>
const tg = window.Telegram?.WebApp;

if (tg) {
    tg.ready();
    tg.expand();
}

/* 🔥 ВАЖНО: ТВОЙ BACKEND */
const API = "https://web-production-e1089.up.railway.app";

/* USER (fallback чтобы не было пусто) */
function getUser() {
    const u = tg?.initDataUnsafe?.user;
    return {
        id: u?.id || "test_user",
        username: u?.username || "guest"
    };
}

/* ---------- PARTS ---------- */
let parts = JSON.parse(localStorage.getItem("parts") || "[]");

function saveParts() {
    localStorage.setItem("parts", JSON.stringify(parts));
}

function renderParts() {
    parts_list.innerHTML = "";
    parts_select.innerHTML = "";

    parts.forEach((p, i) => {
        const li = document.createElement("li");
        li.innerHTML = `
            ${p.name} - ${p.price}
            <button onclick="delPart(${i})">❌</button>
        `;
        parts_list.appendChild(li);

        const opt = document.createElement("option");
        opt.value = JSON.stringify(p);
        opt.text = p.name;
        parts_select.appendChild(opt);
    });
}

function delPart(i) {
    parts.splice(i, 1);
    saveParts();
    renderParts();
}

function addPart() {
    parts.push({
        name: part_name.value,
        price: part_price.value
    });

    saveParts();
    renderParts();
}

/* ---------- SALE ---------- */
async function sendSale() {
    const res = await fetch(API + "/report", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            telegram_id: getUser().id,
            type: "sale",
            model: sale_model.value,
            purchase_price: Number(sale_purchase.value),
            repair_cost: Number(sale_repair.value),
            sell_price: Number(sale_sell.value)
        })
    });

    const data = await res.json();
    sale_profit.innerText = "Profit: " + data.profit;
}

/* ---------- REPAIR ---------- */
async function sendRepair() {
    const selected = [...parts_select.selectedOptions]
        .map(o => JSON.parse(o.value));

    const partsSum = selected.reduce((s, p) => s + Number(p.price), 0);

    await fetch(API + "/report", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            telegram_id: getUser().id,
            type: "repair",
            model: repair_model.value,
            purchase_price: 0,
            repair_cost: Number(repair_price.value) + partsSum,
            sell_price: 0
        })
    });

    alert("Сохранено");
}

/* ---------- 🔥 АНАЛИТИКА (FIX) ---------- */
async function loadAnalytics() {
    showTab("analytics");

    try {
        const res = await fetch(API + "/analytics");

        const text = await res.text();

        let data;
        try {
            data = JSON.parse(text);
        } catch {
            console.error("Сервер вернул НЕ JSON:", text);
            analytics.innerHTML = "<p>Ошибка сервера</p>";
            return;
        }

        analytics.innerHTML = `
            <h3>Аналитика</h3>
            <p>Продажи: ${data.sales_profit}</p>
            <p>Ремонт: ${data.repairs_profit}</p>
            <p><b>Итого: ${data.total_profit}</b></p>
        `;

    } catch (e) {
        analytics.innerHTML = "<p>Ошибка загрузки</p>";
        console.error(e);
    }
}

/* ---------- ADMIN (чтобы не падал) ---------- */
async function loadAdmin() {
    showTab("admin");

    try {
        const res = await fetch(API + "/admin");
        const data = await res.json();

        admin.innerHTML = `
            <h3>Админ</h3>
            <p>Пользователи: ${Object.keys(data.users || {}).length}</p>
            <p>Отчеты: ${data.reports?.length || 0}</p>
        `;
    } catch {
        admin.innerHTML = "<p>Ошибка</p>";
    }
}

/* ---------- PROFILE ---------- */
function loadProfile() {
    showTab("profile");

    const u = getUser();

    profile.innerHTML = `
        <h3>Профиль</h3>
        <p>ID: ${u.id}</p>
        <p>Username: ${u.username}</p>
    `;
}

/* ---------- TABS ---------- */
function showTab(tab) {
    ["sale","repair","parts","analytics","admin","profile"]
        .forEach(id => document.getElementById(id).classList.add("hidden"));

    document.getElementById(tab).classList.remove("hidden");
}

/* INIT */
renderParts();
</script>

</body>
</html>
