<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>CRM</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>

html, body {
    touch-action: manipulation;
    overscroll-behavior: none;
}

body{
    margin:0;
    background:#0b1220;
    color:white;
    font-family:Arial;
}

/* TOP */
.tabbar{
    display:flex;
    overflow-x:auto;
    gap:10px;
    padding:10px;
    background:#111827;
}

.tab{
    background:#1f2937;
    padding:10px 14px;
    border-radius:10px;
    cursor:pointer;
    white-space:nowrap;
}

.container{
    padding:15px;
}

.card{
    background:#111827;
    border-radius:14px;
    padding:15px;
    margin-bottom:15px;
}

.hidden{
    display:none;
}

input, select{
    width:100%;
    margin-top:8px;
    padding:10px;
    border:none;
    border-radius:8px;
    box-sizing:border-box;
}

button{
    width:100%;
    margin-top:10px;
    padding:12px;
    border:none;
    border-radius:10px;
    background:#22c55e;
    font-weight:bold;
    cursor:pointer;
}

.del{
    background:#ef4444;
}

.search-card{
    background:#1f2937;
    padding:10px;
    margin-top:10px;
    border-radius:10px;
}

.user-card{
    background:#1f2937;
    padding:10px;
    border-radius:10px;
    margin-top:10px;
}

</style>
</head>

<body>

<div class="tabbar">

<div class="tab" onclick="showTab('sale')">
📊 Продажа
</div>

<div class="tab" onclick="showTab('repair')">
🛠 Ремонт
</div>

<div class="tab" onclick="showTab('parts')">
🔩 Запчасти
</div>

<div class="tab" onclick="loadAnalytics()">
📈 Аналитика
</div>

<div class="tab" onclick="loadProfile()">
👤 Профиль
</div>

<div class="tab" onclick="loadAdmin()">
⚙️ Админ
</div>

</div>

<div class="container">

<!-- AUTH -->
<div id="auth" class="card">

<h3>Вход / Регистрация</h3>

<input id="auth_username" placeholder="Логин">
<input id="auth_password" type="password" placeholder="Пароль">

<button onclick="registerUser()">
Регистрация
</button>

<button onclick="loginUser()">
Войти
</button>

</div>

<!-- SALE -->
<div id="sale" class="card hidden">

<h3>Продажа</h3>

<input id="sale_model" placeholder="Модель">

<input id="sale_purchase" placeholder="Цена покупки">

<input id="sale_repair" placeholder="Цена ремонта">

<input id="sale_sell" placeholder="Цена продажи">

<button onclick="sendSale()">
Сохранить
</button>

<div id="sale_profit"></div>

</div>

<!-- REPAIR -->
<div id="repair" class="card hidden">

<h3>Ремонт</h3>

<input id="repair_model" placeholder="Модель">

<select id="parts_select" multiple></select>

<input id="repair_price" placeholder="Цена работы">

<button onclick="sendRepair()">
Сохранить
</button>

</div>

<!-- PARTS -->
<div id="parts" class="card hidden">

<h3>Запчасти</h3>

<input id="part_name" placeholder="Название">
<input id="part_price" placeholder="Цена">

<button onclick="addPart()">
Добавить
</button>

<hr>

<input id="search_query" placeholder="Поиск iparts">

<button onclick="searchParts()">
Найти
</button>

<div id="search_results"></div>

<ul id="parts_list"></ul>

</div>

<!-- ANALYTICS -->
<div id="analytics" class="card hidden"></div>

<!-- PROFILE -->
<div id="profile" class="card hidden"></div>

<!-- ADMIN -->
<div id="admin" class="card hidden"></div>

</div>

<script>

const tg = window.Telegram?.WebApp;

if (tg){
    tg.ready();
    tg.expand();
}

document.addEventListener('gesturestart', e => e.preventDefault());

let currentUser = JSON.parse(
    localStorage.getItem("crm_user") || "null"
);

/* =========================
TABS
========================= */

function showTab(tab){

    [
        "sale",
        "repair",
        "parts",
        "analytics",
        "profile",
        "admin"
    ].forEach(id => {

        document
            .getElementById(id)
            .classList.add("hidden");

    });

    document
        .getElementById(tab)
        .classList.remove("hidden");
}

/* =========================
AUTH
========================= */

function updateAuthUI(){

    if(currentUser){

        document
            .getElementById("auth")
            .classList.add("hidden");

    }else{

        document
            .getElementById("auth")
            .classList.remove("hidden");
    }
}

async function registerUser(){

    const username =
        document.getElementById("auth_username").value;

    const password =
        document.getElementById("auth_password").value;

    const r = await fetch("/register",{

        method:"POST",

        headers:{
            "Content-Type":"application/json"
        },

        body:JSON.stringify({

            telegram_id:
                tg?.initDataUnsafe?.user?.id || "0",

            username,
            password
        })
    });

    const data = await r.json();

    if(!r.ok){
        alert(data.detail);
        return;
    }

    currentUser = data.user;

    localStorage.setItem(
        "crm_user",
        JSON.stringify(currentUser)
    );

    updateAuthUI();

    alert("Аккаунт создан");
}

async function loginUser(){

    const username =
        document.getElementById("auth_username").value;

    const password =
        document.getElementById("auth_password").value;

    const r = await fetch("/login",{

        method:"POST",

        headers:{
            "Content-Type":"application/json"
        },

        body:JSON.stringify({
            username,
            password
        })
    });

    const data = await r.json();

    if(!r.ok){

        alert(data.detail);
        return;
    }

    currentUser = data.user;

    localStorage.setItem(
        "crm_user",
        JSON.stringify(currentUser)
    );

    updateAuthUI();

    alert("Вход выполнен");
}

function logout(){

    localStorage.removeItem("crm_user");

    currentUser = null;

    updateAuthUI();

    location.reload();
}

/* =========================
PARTS
========================= */

let parts = JSON.parse(
    localStorage.getItem("parts") || "[]"
);

function saveParts(){

    localStorage.setItem(
        "parts",
        JSON.stringify(parts)
    );
}

function renderParts(){

    const list =
        document.getElementById("parts_list");

    const select =
        document.getElementById("parts_select");

    list.innerHTML = "";
    select.innerHTML = "";

    parts.forEach((p,i)=>{

        const li = document.createElement("li");

        li.innerHTML = `
            ${p.name} - ${p.price}
        `;

        const del = document.createElement("button");

        del.className = "del";

        del.innerText = "Удалить";

        del.onclick = ()=>{

            parts.splice(i,1);

            saveParts();

            renderParts();
        };

        li.appendChild(del);

        list.appendChild(li);

        const opt = document.createElement("option");

        opt.value = JSON.stringify(p);

        opt.text = p.name;

        select.appendChild(opt);
    });
}

function addPart(){

    parts.push({

        name:
            document.getElementById("part_name").value,

        price:
            document.getElementById("part_price").value
    });

    saveParts();

    renderParts();
}

/* =========================
IPARTS
========================= */

async function searchParts(){

    const q =
        document.getElementById("search_query").value;

    const r = await fetch(
        "/parts/search?q=" + encodeURIComponent(q)
    );

    const data = await r.json();

    const container =
        document.getElementById("search_results");

    container.innerHTML = "";

    data.forEach(p=>{

        const div = document.createElement("div");

        div.className = "search-card";

        div.innerHTML = `
            <b>${p.name}</b><br>
            ${p.price}
        `;

        const btn = document.createElement("button");

        btn.innerText = "Добавить";

        btn.onclick = ()=>{

            parts.push({
                name:p.name,
                price:p.price
            });

            saveParts();

            renderParts();
        };

        div.appendChild(btn);

        container.appendChild(div);
    });
}

/* =========================
SALE
========================= */

async function sendSale(){

    if(!currentUser){
        alert("Войди");
        return;
    }

    const res = await fetch("/report",{

        method:"POST",

        headers:{
            "Content-Type":"application/json"
        },

        body:JSON.stringify({

            telegram_id:currentUser.telegram_id,

            type:"sale",

            model:
                document.getElementById("sale_model").value,

            purchase_price:Number(
                document.getElementById("sale_purchase").value
            ),

            repair_cost:Number(
                document.getElementById("sale_repair").value
            ),

            sell_price:Number(
                document.getElementById("sale_sell").value
            )
        })
    });

    const data = await res.json();

    if(!res.ok){
        alert(data.detail);
        return;
    }

    document.getElementById("sale_profit")
        .innerText = "Profit: " + data.profit;
}

/* =========================
REPAIR
========================= */

async function sendRepair(){

    if(!currentUser){
        alert("Войди");
        return;
    }

    const selected =
        [...document.getElementById("parts_select").selectedOptions]
        .map(o=>JSON.parse(o.value));

    let sum = 0;

    selected.forEach(p=>{
        sum += Number(p.price);
    });

    const r = await fetch("/report",{

        method:"POST",

        headers:{
            "Content-Type":"application/json"
        },

        body:JSON.stringify({

            telegram_id:currentUser.telegram_id,

            type:"repair",

            model:
                document.getElementById("repair_model").value,

            purchase_price:sum,

            repair_cost:Number(
                document.getElementById("repair_price").value
            ),

            sell_price:0
        })
    });

    const data = await r.json();

    if(!r.ok){
        alert(data.detail);
        return;
    }

    alert("Сохранено");
}

/* =========================
ANALYTICS
========================= */

async function loadAnalytics(){

    showTab("analytics");

    const r = await fetch("/analytics");

    const d = await r.json();

    const rr = await fetch("/reports");

    const reports = await rr.json();

    let history = "";

    reports.reverse().forEach(r=>{

        history += `
        <div class="search-card">
            <b>${r.type}</b><br>
            ${r.model}<br>
            Profit: ${r.profit}
        </div>
        `;
    });

    document.getElementById("analytics").innerHTML = `

        <h3>Аналитика</h3>

        <p>Продажи: ${d.sales_profit}</p>

        <p>Ремонты: ${d.repairs_profit}</p>

        <p><b>Итого: ${d.total_profit}</b></p>

        <button onclick="clearAnalytics()">
        Очистить аналитику
        </button>

        <h3>История</h3>

        ${history}
    `;
}

async function clearAnalytics(){

    await fetch("/analytics/clear",{
        method:"POST"
    });

    loadAnalytics();
}

/* =========================
PROFILE
========================= */

function loadProfile(){

    showTab("profile");

    if(!currentUser){

        document.getElementById("profile").innerHTML =
        `<h3>Не авторизован</h3>`;

        return;
    }

    document.getElementById("profile").innerHTML = `

        <h3>Профиль</h3>

        <p>Логин: ${currentUser.username}</p>

        <p>Роль: ${currentUser.role}</p>

        <button class="del" onclick="logout()">
        Выйти
        </button>
    `;
}

/* =========================
ADMIN
========================= */

async function loadAdmin(){

    showTab("admin");

    if(!currentUser || currentUser.role !== "admin"){

        document.getElementById("admin").innerHTML =
        `<h3>Нет доступа</h3>`;

        return;
    }

    const r = await fetch("/admin");

    const d = await r.json();

    let users = "";

    for(let id in d.users){

        const u = d.users[id];

        users += `

        <div class="user-card">

            <b>${u.username}</b><br>

            role: ${u.role}<br>

            blocked: ${u.blocked}

            <button onclick="blockUser('${u.username}')">
            Блок
            </button>

            <button onclick="unblockUser('${u.username}')">
            Разблок
            </button>

            <button class="del"
            onclick="deleteUser('${u.username}')">

            Удалить
            </button>

        </div>
        `;
    }

    document.getElementById("admin").innerHTML = `
        <h3>Админка</h3>
        ${users}
    `;
}

async function blockUser(username){

    await fetch("/admin/block",{

        method:"POST",

        headers:{
            "Content-Type":"application/json"
        },

        body:JSON.stringify({

            admin_username:currentUser.username,

            target:username
        })
    });

    loadAdmin();
}

async function unblockUser(username){

    await fetch("/admin/unblock",{

        method:"POST",

        headers:{
            "Content-Type":"application/json"
        },

        body:JSON.stringify({

            admin_username:currentUser.username,

            target:username
        })
    });

    loadAdmin();
}

async function deleteUser(username){

    if(!confirm("Удалить пользователя?")){
        return;
    }

    await fetch("/admin/delete",{

        method:"POST",

        headers:{
            "Content-Type":"application/json"
        },

        body:JSON.stringify({

            admin_username:currentUser.username,

            target:username
        })
    });

    loadAdmin();
}

/* INIT */

updateAuthUI();

renderParts();

</script>

</body>
</html>
