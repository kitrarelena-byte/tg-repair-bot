<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">

<title>CRM</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0f172a;
    color: white;
}

.tabbar {
    display: flex;
    justify-content: space-around;
    background: #1e293b;
    padding: 10px;
}

.tab { cursor: pointer; }

.card {
    background: #1e293b;
    padding: 15px;
    border-radius: 12px;
    margin: 10px;
}

.hidden { display:none }

button {
    width:100%;
    padding:12px;
    margin-top:10px;
    border:none;
    border-radius:10px;
    background:#22c55e;
}

input, select {
    width:100%;
    padding:10px;
    margin-top:8px;
    border-radius:8px;
    border:none;
}
</style>
</head>

<body>

<div class="tabbar">
<div class="tab" onclick="showTab('sale')">Продажа</div>
<div class="tab" onclick="showTab('repair')">Ремонт</div>
<div class="tab" onclick="showTab('reports')">Отчеты</div>
<div class="tab" onclick="loadAnalytics()">Аналитика</div>
<div class="tab" onclick="loadAdmin()">Админ</div>
</div>

<div id="sale" class="card">
<input id="sale_model" placeholder="Модель">
<input id="sale_purchase" placeholder="Цена покупки">
<input id="sale_repair" placeholder="Ремонт">
<input id="sale_sell" placeholder="Продажа">
<button onclick="sendSale()">Сохранить</button>
<div id="sale_profit"></div>
</div>

<div id="repair" class="card hidden">
<input id="repair_model" placeholder="Модель">
<input id="repair_price" placeholder="Цена ремонта">
<button onclick="sendRepair()">Сохранить</button>
</div>

<div id="reports" class="card hidden"></div>
<div id="analytics" class="card hidden"></div>
<div id="admin" class="card hidden"></div>

<script>
const tg = window.Telegram.WebApp;
tg.ready();
tg.expand();

function userId() {
    return tg.initDataUnsafe?.user?.id || "0";
}

// ---------- SALE ----------
async function sendSale() {

    const res = await fetch("/report", {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body: JSON.stringify({
            telegram_id: userId(),
            type:"sale",
            model: document.getElementById("sale_model").value,
            purchase_price: Number(document.getElementById("sale_purchase").value),
            repair_cost: Number(document.getElementById("sale_repair").value),
            sell_price: Number(document.getElementById("sale_sell").value)
        })
    });

    const r = await res.json();
    document.getElementById("sale_profit").innerText = "Profit: " + r.profit;
}

// ---------- REPAIR ----------
async function sendRepair() {

    await fetch("/report", {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body: JSON.stringify({
            telegram_id: userId(),
            type:"repair",
            model: document.getElementById("repair_model").value,
            repair_cost: Number(document.getElementById("repair_price").value)
        })
    });

    alert("Сохранено");
}

// ---------- REPORTS ----------
async function loadReports() {
    showTab("reports");

    const r = await fetch("/reports");
    const data = await r.json();

    let html = "<h3>Отчеты</h3>";

    data.reverse().forEach(x=>{
        html += `<div>
            ${x.model} | ${x.type} | 💰 ${x.profit}
        </div>`;
    });

    document.getElementById("reports").innerHTML = html;
}

// ---------- ANALYTICS ----------
async function loadAnalytics() {
    showTab("analytics");

    const r = await fetch("/analytics");
    const d = await r.json();

    document.getElementById("analytics").innerHTML = `
        <h3>Аналитика</h3>
        <p>Продажи: ${d.sales_profit}</p>
        <p>Ремонты: ${d.repairs_profit}</p>
        <p>Общая: ${d.total_profit}</p>
    `;
}

// ---------- ADMIN ----------
async function loadAdmin() {
    showTab("admin");

    const r = await fetch("/admin");
    const d = await r.json();

    document.getElementById("admin").innerHTML = `
        <h3>Админ</h3>
        <p>Пользователи: ${Object.keys(d.users).length}</p>
        <p>Отчеты: ${d.reports.length}</p>
    `;
}

// ---------- NAV ----------
function showTab(tab) {
    ["sale","repair","reports","analytics","admin"].forEach(id=>{
        document.getElementById(id).classList.add("hidden");
    });

    document.getElementById(tab).classList.remove("hidden");

    if(tab==="reports") loadReports();
}
</script>

</body>
</html>
