<!-- static/index.html -->

<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
/>

<title>CRM</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>

html, body{
touch-action: manipulation;
overscroll-behavior: none;
}

body{
margin:0;
font-family:Arial;
background:#0b1220;
color:white;
}

.tabbar{
display:flex;
overflow-x:auto;
background:#111827;
padding:10px;
gap:10px;
}

.tab{
padding:10px 14px;
background:#1f2937;
border-radius:10px;
cursor:pointer;
white-space:nowrap;
}

.container{
padding:15px;
}

.card{
background:#111827;
padding:15px;
border-radius:14px;
margin-bottom:15px;
}

input, select{
width:100%;
padding:10px;
margin-top:8px;
border-radius:8px;
border:none;
box-sizing:border-box;
background:#1f2937;
color:white;
}

button{
margin-top:10px;
padding:12px;
width:100%;
border-radius:10px;
border:none;
background:#22c55e;
font-weight:bold;
cursor:pointer;
color:white;
}

.del{
background:#ef4444;
}

.hidden{
display:none;
}

.search-card{
background:#1f2937;
padding:10px;
margin-top:8px;
border-radius:10px;
}

/* PROFILE */

.profile-top{
background:linear-gradient(
135deg,
#1f2937,
#111827
);
padding:24px;
border-radius:28px;
display:flex;
gap:20px;
align-items:center;
margin-bottom:24px;
box-shadow:0 0 25px rgba(0,0,0,0.3);
}

.avatar{
width:110px;
height:110px;
border-radius:26px;
object-fit:cover;
border:3px solid #22c55e;
background:#0b1220;
}

.profile-name{
font-size:28px;
font-weight:700;
margin-bottom:10px;
}

.profile-sub{
opacity:0.9;
margin-top:6px;
font-size:15px;
}

.profile-menu{
display:flex;
flex-direction:column;
gap:12px;
margin-bottom:20px;
}

.profile-item{
background:#1f2937;
padding:16px;
border-radius:16px;
cursor:pointer;
font-size:16px;
font-weight:600;
}

</style>
</head>

<body>

<div class="tabbar">
<div class="tab" onclick="showTab('sale')">📊 Продажа</div>
<div class="tab" onclick="showTab('repair')">🛠 Ремонт</div>
<div class="tab" onclick="showTab('parts')">🔩 Запчасти</div>
<div class="tab" onclick="loadProfile()">👤 Профиль</div>
</div>

<div class="container">

<!-- SALE -->
<div id="sale" class="card">

<h3>Продажа</h3>

<input id="sale_model" placeholder="Модель">

<input id="sale_purchase" placeholder="Цена покупки">

<input id="sale_repair" placeholder="Цена ремонта">

<input id="sale_sell" placeholder="Цена продажи">

<button onclick="sendSale()">
Сохранить
</button>

<div id="sale_profit"></div>

</div>

<!-- REPAIR -->
<div id="repair" class="card hidden">

<h3>Ремонт</h3>

<input id="repair_model" placeholder="Модель">

<select id="parts_select" multiple></select>

<input id="repair_price" placeholder="Цена работы">

<button onclick="sendRepair()">
Сохранить
</button>

</div>

<!-- PARTS -->
<div id="parts" class="card hidden">

<h3>Запчасти</h3>

<input id="part_name" placeholder="Название">

<input id="part_price" placeholder="Цена">

<button onclick="addPart()">
Добавить
</button>

<hr>

<input id="search_query" placeholder="Поиск iparts">

<button onclick="searchParts()">
Найти
</button>

<div id="search_results"></div>

<ul id="parts_list"></ul>

</div>

<!-- ANALYTICS -->
<div id="analytics" class="card hidden"></div>

<!-- PROFILE -->
<div id="profile" class="card hidden"></div>

<!-- ADMIN -->
<div id="admin" class="card hidden"></div>

</div>

<script>

const tg = window.Telegram?.WebApp;

if(tg){
tg.ready();
tg.expand();
disableVerticalSwipes: true;
}

function safeUserId(){
return String(tg?.initDataUnsafe?.user?.id || "0");
}

function storageKey(){
return "crm_user_" + safeUserId();
}

function getCurrentUser(){
return JSON.parse(localStorage.getItem(storageKey()));
}

function showTab(tab){

const user = getCurrentUser();

if(!user && tab !== "profile"){
loadProfile();
return;
}

[
"sale",
"repair",
"parts",
"analytics",
"profile",
"admin"
].forEach(id=>{

const el = document.getElementById(id);

if(el){
el.classList.add("hidden");
}

});

document.getElementById(tab).classList.remove("hidden");
}

/* =========================================
PARTS
========================================= */

let parts =
JSON.parse(localStorage.getItem("parts") || "[]");

function saveParts(){
localStorage.setItem("parts", JSON.stringify(parts));
}

function renderParts(){

const list = document.getElementById("parts_list");

const select =
document.getElementById("parts_select");

list.innerHTML = "";
select.innerHTML = "";

parts.forEach((p,i)=>{

const li = document.createElement("li");

li.innerHTML = `${p.name} - ${p.price}`;

const del = document.createElement("button");

del.innerText = "Удалить";

del.className = "del";

del.onclick = ()=>{

parts.splice(i,1);

saveParts();

renderParts();
};

li.appendChild(del);

list.appendChild(li);

const opt = document.createElement("option");

opt.value = JSON.stringify(p);

opt.text = p.name;

select.appendChild(opt);

});
}

function addPart(){

parts.push({
name:document.getElementById("part_name").value,
price:document.getElementById("part_price").value
});

saveParts();

renderParts();
}

/* =========================================
IPARTS
========================================= */

async function searchParts(){

const q =
document.getElementById("search_query").value;

const r =
await fetch("/parts/search?q=" + encodeURIComponent(q));

const data = await r.json();

const container =
document.getElementById("search_results");

container.innerHTML = "";

data.forEach(p=>{

const div = document.createElement("div");

div.className = "search-card";

div.innerHTML = `
<b>${p.name}</b><br>
${p.price}
`;

const btn = document.createElement("button");

btn.innerText = "Добавить";

btn.onclick = ()=>{

parts.push({
name:p.name,
price:p.price
});

saveParts();

renderParts();
};

div.appendChild(btn);

container.appendChild(div);

});
}

/* =========================================
SALE
========================================= */

async function sendSale(){

const res = await fetch("/report",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
telegram_id:safeUserId(),
type:"sale",
model:document.getElementById("sale_model").value,
purchase_price:Number(document.getElementById("sale_purchase").value),
repair_cost:Number(document.getElementById("sale_repair").value),
sell_price:Number(document.getElementById("sale_sell").value)
})
});

const r = await res.json();

if(r.detail){
alert(r.detail);
return;
}

document.getElementById("sale_profit").innerText =
"Profit: " + r.profit;
}

/* =========================================
REPAIR
========================================= */

async function sendRepair(){

const selected =
[...document.getElementById("parts_select").selectedOptions]
.map(o=>JSON.parse(o.value));

let partsSum = 0;

selected.forEach(p=>{
partsSum += Number(p.price);
});

const res = await fetch("/report",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
telegram_id:safeUserId(),
type:"repair",
model:document.getElementById("repair_model").value,
purchase_price:partsSum,
repair_cost:Number(document.getElementById("repair_price").value),
sell_price:0
})
});

const r = await res.json();

if(r.detail){
alert(r.detail);
return;
}

alert("Сохранено");
}

/* =========================================
ANALYTICS
========================================= */

async function loadAnalytics(){

showTab("analytics");

const r = await fetch("/analytics");

const d = await r.json();

const reportsRes = await fetch("/reports");

const reports = await reportsRes.json();

let history = "";

reports.reverse().forEach(r=>{

history += `

<div class="search-card">

<b>${r.type.toUpperCase()}</b><br>

Модель: ${r.model}<br>

Профит: ${r.profit}<br>

Дата: ${r.created_at}

</div>

`;

});

document.getElementById("analytics").innerHTML = `

<h3>Аналитика</h3>

<p>Продажи: ${d.sales_profit}</p>

<p>Ремонт: ${d.repairs_profit}</p>

<p><b>Итого: ${d.total_profit}</b></p>

<button onclick="clearAnalytics()" class="del">
Очистить аналитику
</button>

<hr>

<h3>История</h3>

${history}

`;
}

async function clearAnalytics(){

await fetch("/clear-reports",{
method:"POST"
});

loadAnalytics();
}

/* =========================================
AUTH
========================================= */

function logout(){

localStorage.removeItem(storageKey());

location.reload();
}

async function register(){

const username =
document.getElementById("reg_username").value;

const password =
document.getElementById("reg_password").value;

const res = await fetch("/register",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
telegram_id:safeUserId(),
username,
password
})
});

const data = await res.json();

if(data.detail){
alert(data.detail);
return;
}

localStorage.setItem(
storageKey(),
JSON.stringify(data)
);

loadProfile();
}

async function login(){

const username =
document.getElementById("login_username").value;

const password =
document.getElementById("login_password").value;

const res = await fetch("/login",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
telegram_id:safeUserId(),
username,
password
})
});

const data = await res.json();

if(data.detail){
alert(data.detail);
return;
}

localStorage.setItem(
storageKey(),
JSON.stringify(data)
);

loadProfile();
}

/* =========================================
PROFILE
========================================= */

function loadProfile(){

showTab("profile");

const user = getCurrentUser();

if(user){

const tgUser = tg?.initDataUnsafe?.user || {};

const avatar =
tgUser.photo_url
? tgUser.photo_url
: `https://ui-avatars.com/api/?background=111827&color=22c55e&name=${user.username}`;

const tgUsername =
tgUser.username
? "@" + tgUser.username
: "не указан";

const realName =
tgUser.first_name
? tgUser.first_name
: user.username;

const adminButtons = user.role === "admin"
? `

<div class="profile-menu">

<div
class="profile-item"
onclick="loadAnalytics()"
>
📈 Моя аналитика
</div>

<div
class="profile-item"
onclick="loadAdminUsers()"
>
👥 Пользователи
</div>

</div>

`
: `

<div class="profile-menu">

<div
class="profile-item"
onclick="loadAnalytics()"
>
📈 Моя аналитика
</div>

</div>

`;

document.getElementById("profile").innerHTML = `

<div class="profile-top">

<img
src="${avatar}"
class="avatar"
referrerpolicy="no-referrer"
>

<div>

<div class="profile-name">
${realName}
</div>

<div class="profile-sub">
Telegram: ${tgUsername}
</div>

<div class="profile-sub">
Mini App: ${user.username}
</div>

<div class="profile-sub">
Роль: ${user.role}
</div>

</div>

</div>

${adminButtons}

<button
onclick="logout()"
class="del"
>
Выйти
</button>

`;

}else{

document.getElementById("profile").innerHTML = `

<div class="card">

<h3>Регистрация</h3>

<input id="reg_username" placeholder="Логин">

<input
id="reg_password"
type="password"
placeholder="Пароль"
>

<button onclick="register()">
Создать аккаунт
</button>

<hr>

<h3>Вход</h3>

<input id="login_username" placeholder="Логин">

<input
id="login_password"
type="password"
placeholder="Пароль"
>

<button onclick="login()">
Войти
</button>

</div>

`;
}
}

/* =========================================
ADMIN
========================================= */

async function loadAdminUsers(){

showTab("admin");

const user = getCurrentUser();

if(!user || user.role !== "admin"){

document.getElementById("admin").innerHTML =
"<h3>Нет доступа</h3>";

return;
}

const r = await fetch("/users");

const users = await r.json();

let html = "<h3>Пользователи</h3>";

users.forEach(u=>{

html += `

<div class="search-card">

<b>${u.username}</b><br>

Role: ${u.role}<br>

Blocked: ${u.blocked}<br>

<button onclick="blockUser('${u.username}')">
Блок
</button>

<button onclick="unblockUser('${u.username}')">
Разблок
</button>

<button
class="del"
onclick="deleteUser('${u.username}')"
>
Удалить
</button>

</div>

`;

});

document.getElementById("admin").innerHTML = html;

clearInterval(window.adminUpdater);

window.adminUpdater = setInterval(async ()=>{

const currentUser = getCurrentUser();

if(!currentUser || currentUser.role !== "admin")
return;

if(document.getElementById("admin").classList.contains("hidden"))
return;

loadAdminUsers();

}, 4000);
}

async function blockUser(username){

await fetch("/admin/block",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({username})
});

loadAdminUsers();
}

async function unblockUser(username){

await fetch("/admin/unblock",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({username})
});

loadAdminUsers();
}

async function deleteUser(username){

await fetch("/admin/delete",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({username})
});

loadAdminUsers();
}

/* =========================================
BLOCK CHECK
========================================= */

async function checkBlocked(){

const user = getCurrentUser();

if(!user)
return;

try{

const res = await fetch("/users");

const users = await res.json();

const current =
users.find(u => u.username === user.username);

if(current && current.blocked){

alert("Ваш аккаунт заблокирован");

logout();
}

}catch(e){}
}

/* =========================================
INIT
========================================= */

renderParts();

checkBlocked();

loadProfile();

setInterval(checkBlocked, 5000);

</script>

</body>
</html>
