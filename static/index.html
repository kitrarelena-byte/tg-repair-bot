<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>CRM</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0b1220;
    color: white;
    overflow: hidden;
}

/* TOP BAR */
.tabbar {
    display: flex;
    gap: 8px;
    padding: 10px;
    background: linear-gradient(90deg,#1e293b,#0f172a);
    position: sticky;
    top: 0;
}

.tab {
    flex: 1;
    text-align: center;
    padding: 10px;
    border-radius: 10px;
    background: #1e293b;
    cursor: pointer;
    transition: 0.2s;
}

.tab:hover {
    background: #334155;
}

/* CARDS */
.container { padding: 15px; }

.card {
    background: #1e293b;
    padding: 15px;
    border-radius: 12px;
    margin-bottom: 15px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.3);
}

.hidden { display: none; }

input, select {
    width: 100%;
    padding: 10px;
    margin-top: 8px;
    border-radius: 8px;
    border: none;
}

button {
    margin-top: 10px;
    padding: 12px;
    width: 100%;
    border-radius: 10px;
    border: none;
    background: #22c55e;
    font-weight: bold;
}

/* DELETE PARTS */
li {
    padding: 8px;
    margin-top: 5px;
    background: #0f172a;
    border-radius: 8px;
    cursor: pointer;
}

/* PROFIL */
.profile {
    padding: 10px;
    background: #0f172a;
    border-radius: 10px;
    margin-top: 10px;
}
</style>
</head>

<body>

<div class="tabbar">
    <div class="tab" onclick="showTab('sale')">📊 Продажа</div>
    <div class="tab" onclick="showTab('repair')">🛠 Ремонт</div>
    <div class="tab" onclick="showTab('parts')">🔩 Запчасти</div>
    <div class="tab" onclick="loadAnalytics()">📈 Аналитика</div>
    <div class="tab" onclick="loadAdmin()">👤 Админ</div>
    <div class="tab" onclick="loadProfile()">🙍 Профиль</div>
</div>

<div class="container">

<!-- SALE -->
<div id="sale" class="card">
    <h3>Продажа</h3>
    <input id="sale_model" placeholder="Модель">
    <input id="sale_purchase" placeholder="Цена покупки">
    <input id="sale_repair" placeholder="Цена ремонта">
    <input id="sale_sell" placeholder="Цена продажи">
    <button onclick="sendSale()">Сохранить</button>
    <div id="sale_profit"></div>
</div>

<!-- REPAIR -->
<div id="repair" class="card hidden">
    <h3>Ремонт</h3>
    <input id="repair_model" placeholder="Модель">
    <select id="parts_select" multiple></select>
    <input id="repair_price" placeholder="Цена ремонта">
    <button onclick="sendRepair()">Сохранить</button>
</div>

<!-- PARTS -->
<div id="parts" class="card hidden">
    <h3>Запчасти</h3>
    <input id="part_name" placeholder="Название">
    <input id="part_price" placeholder="Цена">
    <button onclick="addPart()">Добавить</button>
    <ul id="parts_list"></ul>
</div>

<!-- ANALYTICS -->
<div id="analytics" class="card hidden"></div>

<!-- ADMIN -->
<div id="admin" class="card hidden"></div>

<!-- PROFILE -->
<div id="profile" class="card hidden"></div>

</div>

<script>
const tg = window.Telegram.WebApp;
tg.ready();
tg.expand();
tg.disableVerticalSwipes?.(); // 🔥 блок zoom/gesture

let parts = JSON.parse(localStorage.getItem("parts") || "[]");

function safeUserId() {
    return tg?.initDataUnsafe?.user?.id || "0";
}

function showTab(tab) {
    ["sale","repair","parts","analytics","admin","profile"].forEach(id=>{
        document.getElementById(id).classList.add("hidden");
    });
    document.getElementById(tab).classList.remove("hidden");
}

/* PARTS */
function addPart() {
    parts.push({
        name: part_name.value,
        price: Number(part_price.value)
    });

    localStorage.setItem("parts", JSON.stringify(parts));
    renderParts();
}

function renderParts() {
    parts_list.innerHTML = "";
    parts_select.innerHTML = "";

    parts.forEach((p,i)=>{
        const li = document.createElement("li");
        li.innerHTML = '${p.name} - ${p.price} 💣';

        li.onclick = () => {
            parts.splice(i,1);
            renderParts();
};

        parts_list.appendChild(li);

        const opt = document.createElement("option");
        opt.value = JSON.stringify(p);
        opt.text = p.name;
        parts_select.appendChild(opt);
    });
}

/* SALE */
async function sendSale() {

    const partsCost = 0;

    const data = {
        telegram_id: safeUserId(),
        type: "sale",
        model: sale_model.value,
        purchase_price: Number(sale_purchase.value),
        repair_cost: Number(sale_repair.value),
        sell_price: Number(sale_sell.value),
        parts_cost: 0
    };

    const r = await fetch("/report", {
        method:"POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify(data)
    });

    const res = await r.json();
    sale_profit.innerText = "💰 Profit: " + res.profit;
}

/* REPAIR */
async function sendRepair() {

    let partsSum = 0;
    [...parts_select.selectedOptions].forEach(o=>{
        partsSum += JSON.parse(o.value).price;
    });

    await fetch("/report", {
        method:"POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({
            telegram_id: safeUserId(),
            type:"repair",
            model: repair_model.value,
            purchase_price:0,
            repair_cost: Number(repair_price.value),
            sell_price:0,
            parts_cost: partsSum
        })
    });

    alert("Saved");
}

/* ANALYTICS */
async function loadAnalytics() {
    showTab("analytics");
    const r = await fetch("/analytics");
    const d = await r.json();

    analytics.innerHTML = `
        <h3>📈 Analytics</h3>
        <p>Sales: ${d.sales_profit}</p>
        <p>Repairs: ${d.repairs_profit}</p>
        <p>Total: ${d.total_profit}</p>
    `;
}

/* ADMIN */
async function loadAdmin() {
    showTab("admin");

    const r = await fetch("/admin");
    const d = await r.json();

    admin.innerHTML = `
        <h3>👤 Admin</h3>
        <p>Users: ${Object.keys(d.users).length}</p>
        <p>Reports: ${d.reports.length}</p>
    `;
}

/* PROFILE */
async function loadProfile() {
    showTab("profile");

    profile.innerHTML = `
        <h3>🙍 Profile</h3>
        <div class="profile">
            ID: ${safeUserId()}
        </div>
    `;
}

renderParts();
</script>

</body>
</html>
