<!-- static/index.html -->

<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
/>

<title>CRM</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>

html, body{
touch-action: manipulation;
overscroll-behavior: none;
}

body{
margin:0;
font-family:Arial;
background:#0b1220;
color:white;
}

.tabbar{
display:flex;
overflow-x:auto;
background:#111827;
padding:10px;
gap:10px;
}

.tab{
padding:10px 14px;
background:#1f2937;
border-radius:10px;
cursor:pointer;
white-space:nowrap;
}

.container{
padding:15px;
}

.card{
background:#111827;
padding:15px;
border-radius:14px;
margin-bottom:15px;
}

input, select{
width:100%;
padding:10px;
margin-top:8px;
border-radius:8px;
border:none;
box-sizing:border-box;
background:#1f2937;
color:white;
}

button{
margin-top:10px;
padding:12px;
width:100%;
border-radius:10px;
border:none;
background:#22c55e;
font-weight:bold;
cursor:pointer;
color:white;
}

.del{
background:#ef4444;
}

.hidden{
display:none;
}

.search-card{
background:#1f2937;
padding:10px;
margin-top:8px;
border-radius:10px;
}

.profile-top{
background:#1f2937;
padding:18px;
border-radius:20px;
display:flex;
gap:15px;
align-items:center;
margin-bottom:20px;
}

.avatar{
width:90px;
height:90px;
border-radius:20px;
object-fit:cover;
background:#111827;
}

.profile-name{
font-size:24px;
font-weight:bold;
margin-bottom:8px;
}

.profile-sub{
opacity:0.8;
margin-top:4px;
}

.profile-menu{
background:#1f2937;
border-radius:18px;
overflow:hidden;
margin-bottom:20px;
}

.profile-item{
padding:18px;
border-bottom:1px solid #374151;
cursor:pointer;
font-size:18px;
}

.profile-item:last-child{
border-bottom:none;
}

.user-card{
background:#1f2937;
padding:15px;
border-radius:16px;
margin-bottom:15px;
}

.user-title{
font-size:20px;
font-weight:bold;
}

.user-sub{
margin-top:5px;
opacity:0.8;
}

.admin-actions button{
margin-top:10px;
}

</style>
</head>

<body>

<div class="tabbar">
<div class="tab" onclick="showTab('sale')">📊 Продажа</div>
<div class="tab" onclick="showTab('repair')">🛠 Ремонт</div>
<div class="tab" onclick="showTab('parts')">🔩 Запчасти</div>
<div class="tab" onclick="loadAnalytics()">📈 Аналитика</div>
<div class="tab" onclick="loadProfile()">👤 Профиль</div>
</div>

<div class="container">

<div id="sale" class="card">

<h3>Продажа</h3>

<input id="sale_model" placeholder="Модель">

<input id="sale_purchase" placeholder="Цена покупки">

<input id="sale_repair" placeholder="Цена ремонта">

<input id="sale_sell" placeholder="Цена продажи">

<button onclick="sendSale()">
Сохранить
</button>

<div id="sale_profit"></div>

</div>

<div id="repair" class="card hidden">

<h3>Ремонт</h3>

<input id="repair_model" placeholder="Модель">

<select id="parts_select" multiple></select>

<input id="repair_price" placeholder="Цена работы">

<button onclick="sendRepair()">
Сохранить
</button>

</div>

<div id="parts" class="card hidden">

<h3>Запчасти</h3>

<input id="part_name" placeholder="Название">

<input id="part_price" placeholder="Цена">

<button onclick="addPart()">
Добавить
</button>

<hr>

<input id="search_query" placeholder="Поиск iparts">

<button onclick="searchParts()">
Найти
</button>

<div id="search_results"></div>

<ul id="parts_list"></ul>

</div>

<div id="analytics" class="card hidden"></div>

<div id="profile" class="card hidden"></div>

<div id="admin" class="card hidden"></div>

</div>

<script>

const tg = window.Telegram?.WebApp;

if(tg){
tg.ready();
tg.expand();
}

function safeUserId(){
return String(tg?.initDataUnsafe?.user?.id || "0");
}

function storageKey(){
return "crm_user_" + safeUserId();
}

function getCurrentUser(){
return JSON.parse(localStorage.getItem(storageKey()));
}

function showTab(tab){

const user = getCurrentUser();

if(!user && tab !== "profile"){
loadProfile();
return;
}

[
"sale",
"repair",
"parts",
"analytics",
"profile",
"admin"
].forEach(id=>{
document.getElementById(id).classList.add("hidden");
});

document.getElementById(tab).classList.remove("hidden");
}

/* =========================================
PARTS
========================================= */

let parts =
JSON.parse(localStorage.getItem("parts") || "[]");

function saveParts(){
localStorage.setItem("parts", JSON.stringify(parts));
}

function renderParts(){

const list = document.getElementById("parts_list");

const select =
document.getElementById("parts_select");

list.innerHTML = "";
select.innerHTML = "";

parts.forEach((p,i)=>{

const li = document.createElement("li");

li.innerHTML = `${p.name} - ${p.price}`;

const del = document.createElement("button");

del.innerText = "Удалить";

del.className = "del";

del.onclick = ()=>{

parts.splice(i,1);

saveParts();

renderParts();
};

li.appendChild(del);

list.appendChild(li);

const opt = document.createElement("option");

opt.value = JSON.stringify(p);

opt.text = p.name;

select.appendChild(opt);

});
}

function addPart(){

parts.push({
name:document.getElementById("part_name").value,
price:document.getElementById("part_price").value
});

saveParts();

renderParts();
}

/* =========================================
IPARTS
========================================= */

async function searchParts(){

const q =
document.getElementById("search_query").value;

const r =
await fetch("/parts/search?q=" + encodeURIComponent(q));

const data = await r.json();

const container =
document.getElementById("search_results");

container.innerHTML = "";

data.forEach(p=>{

const div = document.createElement("div");

div.className = "search-card";

div.innerHTML = `
<b>${p.name}</b><br>
${p.price}
`;

const btn = document.createElement("button");

btn.innerText = "Добавить";

btn.onclick = ()=>{

parts.push({
name:p.name,
price:p.price
});

saveParts();

renderParts();
};

div.appendChild(btn);

container.appendChild(div);

});
}

/* =========================================
SALE
========================================= */

async function sendSale(){

const res = await fetch("/report",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
telegram_id:safeUserId(),
type:"sale",
model:document.getElementById("sale_model").value,
purchase_price:Number(document.getElementById("sale_purchase").value),
repair_cost:Number(document.getElementById("sale_repair").value),
sell_price:Number(document.getElementById("sale_sell").value)
})
});

const r = await res.json();

if(r.detail){
alert(r.detail);
return;
}

document.getElementById("sale_profit").innerText =
"Profit: " + r.profit;
}

/* =========================================
REPAIR
========================================= */

async function sendRepair(){

const selected =
[...document.getElementById("parts_select").selectedOptions]
.map(o=>JSON.parse(o.value));

let partsSum = 0;

selected.forEach(p=>{
partsSum += Number(p.price);
});

const res = await fetch("/report",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
telegram_id:safeUserId(),
type:"repair",
model:document.getElementById("repair_model").value,
purchase_price:partsSum,
repair_cost:Number(document.getElementById("repair_price").value),
sell_price:0
})
});

const r = await res.json();

if(r.detail){
alert(r.detail);
return;
}

alert("Сохранено");
}

/* =========================================
ANALYTICS
========================================= */

async function loadAnalytics(){

showTab("analytics");

const r = await fetch("/analytics");

const d = await r.json();

const reportsRes = await fetch("/reports");

const reports = await reportsRes.json();

let history = "";

reports.reverse().forEach(r=>{

history += `

<div class="search-card">

<b>${r.type.toUpperCase()}</b><br>

Модель: ${r.model}<br>

Профит: ${r.profit}<br>

Дата: ${r.created_at}

</div>

`;

});

document.getElementById("analytics").innerHTML = `

<h3>Аналитика</h3>

<p>Продажи: ${d.sales_profit}</p>

<p>Ремонт: ${d.repairs_profit}</p>

<p><b>Итого: ${d.total_profit}</b></p>

<button onclick="clearAnalytics()" class="del">
Очистить аналитику
</button>

<hr>

<h3>История</h3>

${history}

`;
}

async function clearAnalytics(){

await fetch("/clear-reports",{
method:"POST"
});

loadAnalytics();
}

/* =========================================
AUTH
========================================= */

function logout(){

localStorage.removeItem(storageKey());

loadProfile();
}

async function register(){

const username =
document.getElementById("reg_username").value;

const password =
document.getElementById("reg_password").value;

const res = await fetch("/register",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
telegram_id:safeUserId(),
username,
password
})
});

const data = await res.json();

if(data.detail){
alert(data.detail);
return;
}

localStorage.setItem(
storageKey(),
JSON.stringify(data)
);

loadProfile();
}

async function login(){

const username =
document.getElementById("login_username").value;

const password =
document.getElementById("login_password").value;

const res = await fetch("/login",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
telegram_id:safeUserId(),
username,
password
})
});

const data = await res.json();

if(data.detail){
alert(data.detail);
return;
}

localStorage.setItem(
storageKey(),
JSON.stringify(data)
);

loadProfile();
}

/* =========================================
PROFILE
========================================= */

function loadProfile(){

showTab("profile");

const user = getCurrentUser();

if(user){

const tgUser = tg?.initDataUnsafe?.user;

const avatar =
tgUser?.photo_url ||
"https://ui-avatars.com/api/?name=" + user.username;

const tgUsername =
tgUser?.username || "нет username";

const adminButtons = user.role === "admin"
? `
<div class="profile-menu">

<div class="profile-item"
onclick="loadAnalytics()">
📈 Моя аналитика
</div>

<div class="profile-item"
onclick="loadAdminUsers()">
👥 Пользователи
</div>

</div>
`
: `
<div class="profile-menu">

<div class="profile-item"
onclick="loadAnalytics()">
📈 Моя аналитика
</div>

</div>
`;

document.getElementById("profile").innerHTML = `

<div class="profile-top">

<img src="${avatar}" class="avatar">

<div>

<div class="profile-name">
${tgUser?.first_name || user.username}
</div>

<div class="profile-sub">
Telegram: @${tgUsername}
</div>

<div class="profile-sub">
Mini App: ${user.username}
</div>

<div class="profile-sub">
Роль: ${user.role}
</div>

</div>

</div>

${adminButtons}

<button
onclick="logout()"
class="del"
>
Выйти
</button>

`;

}else{

document.getElementById("profile").innerHTML = `

<div class="card">

<h3>Регистрация</h3>

<input id="reg_username" placeholder="Логин">

<input
id="reg_password"
type="password"
placeholder="Пароль"
>

<button onclick="register()">
Создать аккаунт
</button>

<hr>

<h3>Вход</h3>

<input id="login_username" placeholder="Логин">

<input
id="login_password"
type="password"
placeholder="Пароль"
>

<button onclick="login()">
Войти
</button>

</div>

`;
}
}

/* =========================================
ADMIN USERS
========================================= */

async function loadAdminUsers(){

showTab("admin");

const r = await fetch("/users");

const users = await r.json();

let html = `

<h2>Пользователи</h2>

`;

users.forEach(u=>{

html += `

<div class="user-card">

<div>

<div class="user-title">
${u.username}
</div>

<div class="user-sub">
Роль: ${u.role}
</div>

<div class="user-sub">
Статус:
${u.blocked ? "ЗАБЛОКИРОВАН" : "АКТИВЕН"}
</div>

</div>

<div class="admin-actions">

<button
onclick="blockUser('${u.username}')"
class="del"
>
Блок
</button>

<button
onclick="unblockUser('${u.username}')"
>
Разблок
</button>

<button
onclick="deleteUser('${u.username}')"
class="del"
>
Удалить
</button>

</div>

</div>

`;

});

document.getElementById("admin").innerHTML = html;
}

async function blockUser(username){

await fetch("/admin/block",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({username})
});

loadAdminUsers();
}

async function unblockUser(username){

await fetch("/admin/unblock",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({username})
});

loadAdminUsers();
}

async function deleteUser(username){

if(!confirm("Удалить аккаунт?"))
return;

await fetch("/admin/delete",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({username})
});

loadAdminUsers();
}

/* =========================================
INIT
========================================= */

renderParts();

loadProfile();

</script>

</body>
</html>
